<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lower-Limb Nerve Explorer — lumbosacral plexus to foot</title>
<style>
  :root{
    --ink:#161b22; --ink-soft:#445; --line:#e3e7ee; --line-soft:#eef1f6;
    --paper:#f6f7f9; --card:#ffffff;
    --nerve:#b8332a; --motor:#2566a8; --sensory:#c2761a; --pass:#2c8a5f; --pearl:#9a7a16; --root:#475569;
    --nerve-bg:#fbecea; --motor-bg:#eaf1f9; --sensory-bg:#fbf1e3; --pass-bg:#e7f4ec; --pearl-bg:#f7f1dc; --root-bg:#eef1f5;
    --focus:#161b22;
    --r:10px; --r-sm:6px;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--paper);line-height:1.45;
       -webkit-font-smoothing:antialiased;font-size:14px}
  a{color:inherit}

  /* ---------- top bar ---------- */
  header.bar{position:sticky;top:0;z-index:40;background:rgba(246,247,249,.92);
    backdrop-filter:saturate(140%) blur(8px);border-bottom:1px solid var(--line);padding:10px 18px}
  .bar-row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;max-width:1500px;margin:0 auto}
  .title{display:flex;flex-direction:column;line-height:1.1;margin-right:6px}
  .title b{font-size:15px;letter-spacing:-.01em}
  .title span{font-size:11px;color:var(--ink-soft);font-family:var(--mono);letter-spacing:.02em}
  .search{flex:1 1 220px;min-width:170px;position:relative}
  .search input{width:100%;padding:8px 30px 8px 12px;border:1px solid var(--line);border-radius:var(--r-sm);
    background:var(--card);font:inherit;color:var(--ink)}
  .search input:focus{outline:2px solid var(--focus);outline-offset:0;border-color:transparent}
  .search .x{position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--ink-soft);
    border:0;background:none;font-size:15px;display:none}
  .chips{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
  .chips .lab{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin-right:2px}
  .rootchip{font-family:var(--mono);font-size:12px;padding:6px 8px;border:1px solid var(--line);
    border-radius:var(--r-sm);background:var(--card);cursor:pointer;color:var(--root);font-weight:600;
    transition:.12s}
  .rootchip:hover{border-color:var(--root)}
  .rootchip.on{background:var(--root);color:#fff;border-color:var(--root)}
  .toggles{display:flex;gap:5px}
  .tg{font-size:11px;padding:6px 9px;border:1px solid var(--line);border-radius:var(--r-sm);
    background:var(--card);cursor:pointer;display:flex;gap:6px;align-items:center;color:var(--ink-soft)}
  .tg .dot{width:9px;height:9px;border-radius:2px}
  .tg.off{opacity:.4;text-decoration:line-through}
  .tg[data-t=motor] .dot{background:var(--motor)} .tg[data-t=sensory] .dot{background:var(--sensory)}
  .tg[data-t=pass] .dot{background:var(--pass)} .tg[data-t=pearl] .dot{background:var(--pearl)}
  .ghost{font-size:11px;color:var(--ink-soft);border:1px solid var(--line);background:var(--card);
    border-radius:var(--r-sm);padding:6px 9px;cursor:pointer}
  .ghost:hover{border-color:var(--ink-soft)}
  .ghost.langon{border-color:var(--root);color:var(--root);font-weight:600}

  .status{max-width:1500px;margin:8px auto 0;font-size:12px;color:var(--ink-soft);min-height:16px}
  .status b{color:var(--ink)} .status .key{font-family:var(--mono)}

  main{max-width:1500px;margin:0 auto;padding:16px 18px 60px}

  /* ---------- plexus navigator ---------- */
  .nav-wrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:6px 10px 2px;margin-bottom:18px;position:relative;overflow:hidden}
  .nav-wrap .hint{display:block;text-align:right;font-size:11px;color:var(--ink-soft);
    font-family:var(--mono);margin:0 2px 4px;line-height:1.4}
  svg.braid{width:100%;height:auto;display:block;touch-action:manipulation}
  .cmap-wrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:8px 12px;margin:2px 0 18px;overflow-x:auto}
  svg.cmap{width:100%;min-width:820px;height:auto;display:block;font-family:var(--sans)}
  .cmap .creg{fill:#9aa4b1;font-size:11px;font-weight:600;text-anchor:middle;text-transform:uppercase;letter-spacing:.05em}
  .cmap .cdiv{stroke:#eef1f5;stroke-width:1}
  .cmap .clane{font-size:12.5px;font-weight:700}
  .cmap .claneln{stroke-width:2.6;opacity:.30;stroke-linecap:round}
  .cmap .clbl{fill:#3a4654;font-size:10px;paint-order:stroke;stroke:#fff;stroke-width:3px;stroke-linejoin:round}
  .csite{cursor:pointer}
  .csite .cdot,.csite .chalo{transition:.12s}
  .csite:hover .cdot{r:6.5}
  .csite:hover .chalo{stroke:#1f2a37;stroke-width:1.6}
  .csite.sel .cdot{fill:#0b6b3a}
  .csite.sel .chalo{stroke:#0b3b22;stroke-width:2}
  .csite.sel .clbl{font-weight:700;fill:#0b3b22}
  .sitehit{background:#e7f6ee;box-shadow:inset 0 0 0 1.5px #97d3b1;border-radius:7px}
  .braid .seg{fill:none;stroke:#c4ccd6;stroke-width:2.4;stroke-linecap:round}
  .braid .seg.post{stroke-dasharray:none}
  .braid .node{cursor:pointer}
  .braid .node circle,.braid .node rect{stroke:#fff;stroke-width:1.5}
  .braid .nodetext{font-family:var(--mono);font-size:11px;fill:#fff;font-weight:600;
    text-anchor:middle;dominant-baseline:central;pointer-events:none}
  .braid .chiplbl{font-family:var(--sans);font-size:11.5px;font-weight:600;fill:#33404f;
    text-anchor:middle;dominant-baseline:central;pointer-events:none}
  .braid .nlabel{font-family:var(--sans);font-size:10.5px;fill:var(--ink-soft);text-anchor:middle}
  .braid .structlbl{font-family:var(--sans);font-size:12px;font-weight:600;fill:#2a3340;text-anchor:middle}
  .braid .lvdim{opacity:.12}
  .braid .seg.lvhit{stroke:#475569;stroke-width:3.4;opacity:1}
  .braid .node.lvhit,.braid .branchbox.lvhit{opacity:1}
  .braid .node.root.lvhit circle{stroke:#111827;stroke-width:3}
  .braid.rootlit .seglabel{opacity:.12}
  .braid .colhdr{font-family:var(--sans);font-size:10px;fill:#9aa4b1;text-anchor:middle;
    text-transform:uppercase;letter-spacing:.1em}
  .braid .seglabel{font-family:var(--sans);font-size:9.5px;font-style:italic;fill:#7a8694;
    text-anchor:middle;paint-order:stroke;stroke:#fff;stroke-width:2.8px;stroke-linejoin:round}
  .braid .node.dim{opacity:.28}
  .braid .seg.dim{opacity:.12}
  .braid .branchbox{cursor:pointer}
  .treewrap{margin:8px 0 6px;overflow-x:auto;border:1px solid var(--line-soft);border-radius:8px;
    background:#fcfdfe;padding:8px 10px}
  .treelabel{font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);
    font-weight:600;margin:0 2px 6px}
  .tnode.tn-on{cursor:pointer}
  .tnode.tn-on .tnbox{transition:.12s}
  .tnode.tn-on:hover .tnbox{stroke-opacity:1}
  .tnode.sel .tnbox{stroke-width:2.4;stroke-opacity:1}
  .cbody.treemode [data-search]:not(.thit){opacity:.25}
  .cbody.treemode .thit{background:#eaf3ff;box-shadow:inset 0 0 0 1px #c5dcf5;border-radius:6px}
  .braid .node.small.lvhit rect{stroke:#475569;stroke-width:1.6}
  .braid .node.small.small-on{cursor:pointer}
  .braid .node.tap.tap-on{cursor:pointer}
  .braid .node.tap.tap-on:hover circle{stroke:#475569;stroke-width:2}
  .braid .node.small.small-on:hover circle{stroke:#475569;stroke-width:2}
  .braid .node.small.small-on:hover .nlabel{fill:#111827;font-weight:600}
  .braid .branchbox .bbg{transition:.12s}
  .braid .branchbox:hover .bbg{stroke-opacity:.9;filter:brightness(.985)}
  .braid .branchbox.dim{opacity:.3}
  .braid .bconn.dim{opacity:.3}
  .braid .bconn.lvhit{opacity:1}
  .braid .seg.sciasplit{stroke-dasharray:5 4;opacity:.75}

  @keyframes sweep{to{stroke-dashoffset:0}}
  .braid .seg.sweep{stroke-dasharray:var(--len);stroke-dashoffset:var(--len);
    animation:sweep .75s ease forwards}

  /* ---------- section labels ---------- */
  .eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-soft);
    font-weight:600;margin:0 2px 8px;display:flex;align-items:center;gap:8px}
  .eyebrow::after{content:"";flex:1;height:1px;background:var(--line)}

  /* ---------- lesion explorer ---------- */
  .lesionbar{display:flex;flex-wrap:wrap;gap:10px 14px;margin:0 2px 12px}
  .lgroup{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
  .lgrp-label{font-size:11px;font-weight:700;margin-right:1px}
  .lpill{border:1.4px solid;border-radius:999px;padding:4px 11px;font-size:12px;font-weight:600;
    background:#fff;cursor:pointer;line-height:1.25;transition:.12s;font-family:var(--sans)}
  .lpill:hover{filter:brightness(.96)}
  .lesionpanel{border:1px solid var(--line);border-radius:var(--r);padding:13px 15px;margin:0 0 16px;background:var(--card)}
  .lesionpanel .lphead{font-weight:700;font-size:14px;margin:0 0 9px}
  .lcols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:560px){.lcols{grid-template-columns:1fr}}
  .lcol h4{margin:0 0 6px;font-size:10.5px;text-transform:uppercase;letter-spacing:.07em}
  .lcol.aff h4{color:#b8332a}
  .lcol.spd h4{color:#2c8a5f}
  .lcol ul{margin:0;padding:0;list-style:none;display:flex;flex-wrap:wrap;gap:4px}
  .lcol li{font-size:12px;padding:2px 8px;border-radius:6px}
  .lcol.aff li{background:#fceeec;color:#9a2a22}
  .lcol.spd li{background:#eaf6ef;color:#1f6d49}
  .lsens{margin:11px 0 0;font-size:12.5px;color:#33404f;line-height:1.5}
  .lsens b{color:#1f2937}
  .lnote{margin:7px 0 0;font-size:12px;color:var(--ink-soft);font-style:italic;line-height:1.5}

  /* ---------- plexus / proximal pattern panels ---------- */
  .braid .plexel rect{cursor:pointer}
  .braid .plexel:hover rect{stroke:#475569;stroke-width:2}
  body.plexmode .item:not(.hit){opacity:.3}
  body.plexmode .item.hit{background:#eaf2fb;box-shadow:inset 0 0 0 1px #c2d8f0}
  body.plexmode .item.hit .lvl.match{background:#2566a8;color:#fff;opacity:1}
  .plexpanel{border:1px solid var(--line);border-left:4px solid #475569;border-radius:var(--r);
    padding:13px 15px;margin:0 0 14px;background:var(--card)}
  .plexpanel .pphead{font-weight:700;font-size:14.5px;margin:0 0 3px;color:#2a3340}
  .plexpanel .ppsub{font-size:11px;color:var(--ink-soft);margin:0 0 10px}
  .pprow{display:grid;grid-template-columns:120px 1fr;gap:4px 12px;font-size:12.5px;line-height:1.5;
    padding:5px 0;border-top:1px solid var(--line-soft)}
  .pprow:first-of-type{border-top:0}
  .pprow .ppk{font-weight:700;color:#475569;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;padding-top:1px}
  .pprow.warn .ppk{color:#b8332a}
  .pprow .ppv b{color:#1f2937}
  @media(max-width:560px){.pprow{grid-template-columns:1fr;gap:1px}}

  /* ---------- foot-drop matrix ---------- */
  .fdwrap{border:1px solid var(--line);border-radius:var(--r);background:var(--card);
    padding:10px 12px 14px;margin:0 0 18px;overflow-x:auto}
  table.fd{border-collapse:collapse;width:100%;min-width:640px;font-size:12px}
  table.fd th,table.fd td{border:1px solid var(--line-soft);padding:5px 8px;text-align:center}
  table.fd thead th{background:#f3f5f8;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;
    color:#3a4654;cursor:pointer;transition:.12s}
  table.fd thead th.rowh{text-align:left;cursor:default}
  table.fd thead th.colon{background:#475569;color:#fff}
  table.fd tbody th{text-align:left;font-weight:600;color:#33404f;background:#fbfcfd;white-space:nowrap}
  table.fd td.mk{color:#b8332a;font-weight:700}
  table.fd td.colon{background:#eef4fb}
  table.fd tbody tr.sechd th{background:#eef1f5;color:#5b6573;font-size:10px;text-transform:uppercase;
    letter-spacing:.05em;font-weight:700}
  .fdcap{font-size:11px;color:var(--ink-soft);margin:8px 2px 0;line-height:1.5}

  /* ---------- roots strip ---------- */
  .roots{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:22px}
  .rootcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:11px 12px;
    border-top:3px solid var(--root);transition:.12s;cursor:pointer}
  .rootcard.on{box-shadow:0 0 0 2px var(--root) inset;border-top-color:var(--root)}
  .rootcard h3{margin:0 0 6px;font-family:var(--mono);font-size:15px;color:var(--root);display:flex;
    justify-content:space-between;align-items:baseline;gap:6px}
  .rootcard h3 em{font-style:normal;font-size:9.5px;color:var(--ink-soft);font-family:var(--sans);text-align:right}
  .rootcard .blk{margin:6px 0}
  .rootcard .blk .t{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);
    margin-bottom:2px}
  .rootcard .blk .v{font-size:12px}
  .rootcard .item{padding:2px 0}
  .derm{color:var(--sensory)}

  /* ---------- nerve cards ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
    gap:14px;align-items:start}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;
    transition:.15s;scroll-margin-top:130px}
  .card.span2{grid-column:span 2}
  .card.focus{box-shadow:0 0 0 2px var(--focus);}
  .card.dimcard{opacity:.5}
  .chead{padding:12px 14px;border-bottom:1px solid var(--line-soft);cursor:pointer;
    display:flex;align-items:center;gap:10px;border-left:4px solid var(--nerve)}
  .chead .nm{font-size:15px;font-weight:650;letter-spacing:-.01em}
  .chead .lv{font-family:var(--mono);font-size:11px;color:#fff;background:var(--nerve);
    padding:2px 7px;border-radius:20px;margin-left:auto;white-space:nowrap}
  .chead .car{color:var(--ink-soft);font-size:11px;transition:.15s}
  .card.collapsed .car{transform:rotate(-90deg)}
  .card.collapsed .cbody{display:none}
  .cbody{padding:4px 14px 14px}
  .cbody .divnote{color:var(--ink-soft);font-size:11px;margin-top:8px;font-style:italic}

  .sec{margin-top:12px}
  .sec .sh{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;
    display:flex;align-items:center;gap:6px;margin-bottom:6px}
  .sec .sh .sq{width:9px;height:9px;border-radius:2px}
  .sh.motor{color:var(--motor)} .sh.motor .sq{background:var(--motor)}
  .sh.sensory{color:var(--sensory)} .sh.sensory .sq{background:var(--sensory)}
  .sh.pass{color:var(--pass)} .sh.pass .sq{background:var(--pass)}
  .sh.pearl{color:var(--pearl)} .sh.pearl .sq{background:var(--pearl)}

  .item{display:flex;align-items:flex-start;gap:8px;padding:4px 6px;border-radius:var(--r-sm);
    font-size:13px;transition:.1s}
  .item .mn{flex:1}
  .item .mn .note{color:var(--ink-soft);font-size:11.5px}
  .lvls{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end}
  .lvl{font-family:var(--mono);font-size:10px;padding:1px 5px;border-radius:10px;
    background:var(--root-bg);color:var(--root);white-space:nowrap}
  .lvl.minor{opacity:.5}
  .pass-item{background:var(--pass-bg)} .pass-item .nm2{color:var(--pass);font-weight:600}
  .pearl-item{font-size:12.5px;color:#5b4d10;background:var(--pearl-bg);display:block;padding:6px 8px;
    border-radius:var(--r-sm);margin-bottom:4px}

  .sub{margin:8px 0;border:1px dashed var(--line);border-radius:var(--r-sm);padding:8px 10px;background:#fafbfc}
  .sub .subh{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--nerve);margin-bottom:4px;
    display:flex;gap:8px;align-items:center}
  .sub .subh .tag{font-size:9px;background:var(--nerve);color:#fff;padding:1px 6px;border-radius:10px;
    text-transform:uppercase;letter-spacing:.05em}

  ol.sites{margin:4px 0 0;padding-left:20px;font-size:12.5px}
  ol.sites li{margin:2px 0}
  ol.sites li.key{font-weight:600;color:var(--pass)}

  body.rootmode .item:not(.hit){opacity:.32}
  body.rootmode .item.hit{background:#fff6cc;box-shadow:inset 0 0 0 1px #efe09a}
  body.rootmode .item.hit .lvl.match{background:var(--root);color:#fff;opacity:1}

  mark{background:#fde68a;color:inherit;border-radius:2px;padding:0 1px}

  footer{max-width:1500px;margin:0 auto;padding:0 18px 40px;font-size:11px;color:var(--ink-soft)}
  footer code{font-family:var(--mono);background:#eef1f5;padding:1px 4px;border-radius:3px}

  .eponyms{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin:0 2px 10px}
  @media(max-width:620px){.eponyms{grid-template-columns:1fr}}
  .epsub{grid-column:1/-1;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink-soft);margin:10px 0 1px;display:flex;align-items:baseline}
  .epsub:first-child{margin-top:0}
  .epsub-src{font-weight:600;text-transform:none;letter-spacing:0;font-style:italic;opacity:.75;font-size:10.5px;margin-left:9px}
  .epi{border:1px solid var(--line);border-radius:12px;padding:11px 13px 12px 16px;background:var(--card);
    font-size:12.5px;line-height:1.5;color:#33404f;position:relative;overflow:hidden}
  .epi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px}
  .epi.rule::before{background:#475569}
  .epi.syn::before{background:var(--pearl)}
  .epi .epihead{font-weight:700;font-size:13px;margin:0 0 4px;color:#2a3340}
  .epi .epibody{color:#33404f}
  .epi b{color:#1f2937}
  .epi.hit{box-shadow:0 0 0 2px var(--pearl) inset;border-color:var(--pearl)}

  @media (max-width:760px){
    .card.span2{grid-column:span 1}
  }
  @media (prefers-reduced-motion:reduce){
    .braid .seg.sweep{animation:none;stroke-dashoffset:0}
    *{transition:none!important}
  }
  @media print{
    header.bar,.nav-wrap .hint,.toggles,.search,.chips,.ghost{display:none!important}
    .card.collapsed .cbody{display:block!important}
    body{background:#fff}
    .grid{display:block} .card{break-inside:avoid;margin-bottom:10px}
    .card.dimcard,.item{opacity:1!important}
    .braid .dim,.braid .lvdim,.braid .lvhit,.braid .lit,.braid .sweep{opacity:1!important}
    .cbody.treemode [data-search]{opacity:1!important;background:none!important;box-shadow:none!important}
    body.rootmode .item,body.plexmode .item,.item.hit,.lvl.match{opacity:1!important}
    .nav-wrap,.cmap-wrap,.fdwrap{break-inside:avoid;overflow:visible}
    svg.cmap{min-width:0}
    .eyebrow{break-after:avoid}
  }
  /* ---- CHUNK7 render additions ---- */
  .item .note,.item .nm2 .note{color:var(--ink-soft);font-size:11.5px;font-weight:400}
  .braid .tap .mk{font-family:var(--sans);font-size:9.5px;font-weight:600;fill:#5b4670}
  .braid .tap .mk2{font-family:var(--sans);font-size:8.5px;font-weight:500;fill:#8a7ba0}
  .braid .tap.lvdim,.braid .tap.dim{opacity:.14}
  .braid .tap.lvhit .mk,.braid .tap.lit .mk,.braid .tap.lvhit .mk2,.braid .tap.lit .mk2{fill:#3a2550}
  .braid .seg.feeder{stroke:#c4ccd6}
  .braid .seg.muscle{stroke:#d3c1e0;stroke-width:1.6}
  .braid .seg.muscle.lit{stroke-width:2.2}
  .braid .node.small.lit circle,.braid .plexel.sel rect{stroke:#475569;stroke-width:2}
  /* nerve-focus: make the lit chain pop */
  .braid .seg.lit:not(.muscle){stroke:#475569;stroke-width:3.2}
  .braid .seg.muscle.lit{stroke:#8f2f8f}
  .braid .node.root.lit circle{stroke:#1f2937;stroke-width:2.6}
  .braid .node.term.lit rect{stroke:#1f2937;stroke-width:2}
  .braid .plexel.lit rect{stroke:#475569;stroke-width:2;fill:#e3ebf5}
  .braid .plexel.sel rect{fill:#e3ebf5}
  .braid .plexel:hover rect,.braid .node.term:hover rect{filter:brightness(.95);cursor:pointer}
  .braid .node.root,.braid .node.term,.braid .plexel{cursor:pointer}
  table.fd td.fx{color:#2c8a5f;font-weight:700}
  table.fd td.fxs{color:#c2761a;font-weight:700}

  .lcol .lv{font-size:12.5px;line-height:1.5}
  .lcols{grid-template-columns:1fr 1fr 1fr}
  @media(max-width:640px){.lcols{grid-template-columns:1fr}}

  /* ---------- study planner ---------- */
  .planbar,.quizbar{display:flex;flex-wrap:wrap;gap:8px;margin:0 2px 12px}

    background:#fff;cursor:pointer;line-height:1.25;transition:.12s;font-family:var(--sans);color:#2a3340}
  .planpill:hover{border-color:var(--motor);color:var(--motor)}
  .planpill.on{background:var(--motor);border-color:var(--motor);color:#fff}
  .planpanel{border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;margin:0 0 18px;background:var(--card)}
  .planpanel .plhead{font-weight:800;font-size:15px;margin:0 0 3px;color:#1f2937}
  .planpanel .plvig{font-size:12.5px;color:var(--ink-soft);line-height:1.5;margin:0 0 12px;font-style:italic}

  @media(max-width:680px){.plcols{grid-template-columns:1fr}.plcols2{grid-template-columns:1fr!important}}
  .plcol h4{margin:0 0 7px;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em}
  .plcol.ncs h4{color:var(--motor)} .plcol.ndl h4{color:var(--nerve)}

  .plitem:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
  .plitem .pln{font-size:12.5px;font-weight:700;color:#2a3340}
  .plitem .plw{font-size:12px;color:var(--ink-soft);line-height:1.45;margin-top:1px}
  .plbottom{margin-top:13px;padding:11px 13px;border-radius:9px;background:var(--pearl-bg);
    border-left:3px solid var(--pearl);font-size:12.5px;line-height:1.5;color:#3a2f10}
  .plbottom b{color:#1f2937}

  /* ---------- NCS reference ---------- */
  .ncswrap{overflow-x:auto;margin:0 2px 10px;border:1px solid var(--line);border-radius:var(--r)}
  table.ncs{border-collapse:collapse;width:100%;font-size:12px;min-width:640px}

  table.ncs thead th{background:#f4f6f9;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);
    position:sticky;top:0}
  table.ncs tbody tr:hover{background:#f9fafc}
  table.ncs .nnm{font-weight:700;color:#2a3340;white-space:nowrap}
  table.ncs .ntag{display:inline-block;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:5px;margin-left:6px;vertical-align:middle}
  table.ncs .ntag.mot{background:var(--motor-bg);color:var(--motor)}
  table.ncs .ntag.sen{background:var(--sensory-bg);color:var(--sensory)}
  table.ncs .ntag.mix{background:var(--pass-bg);color:var(--pass)}
  table.ncs .nnorm{font-family:var(--mono);font-size:11px;color:#33404f;white-space:nowrap}

  @media(max-width:680px){.ncsnotes{grid-template-columns:1fr}}
  .ncsnote{border:1px solid var(--line);border-radius:11px;padding:11px 13px 12px 16px;background:var(--card);

  .ncsnote .nnh{font-weight:700;font-size:13px;margin:0 0 4px;color:#2a3340}

  .usnote .ustag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--motor);margin-right:7px}

  /* ---------- quiz ---------- */
  .quizbar{align-items:center}

  @media(max-width:720px){.quiz{grid-template-columns:1fr}}
  .qcard{border:1px solid var(--line);border-radius:12px;padding:13px 15px;background:var(--card)}

  .qcard .qstem b{color:#1f2937}

    background:#fff;transition:.12s;color:#2a3340;text-align:left;font-family:var(--sans);line-height:1.35}
  .qopt:hover{border-color:#b9c2cd;background:#f9fafc}
  .qopt.correct{background:#eaf6ef;border-color:var(--pass);color:#1f6d49;font-weight:600}
  .qopt.wrong{background:#fceeec;border-color:var(--nerve);color:#9a2a22}
  .qopt.locked{cursor:default}
  .qexplain{margin-top:10px;padding:10px 12px;border-radius:8px;background:var(--pass-bg);
    font-size:12px;line-height:1.5;color:#1f4f39;display:none}
  .qexplain.show{display:block}
  .qexplain b{color:#0d3b22}
</style>

<body>
<header class="bar">
  <div class="bar-row">
    <div class="title"><b id="ttlA">Lower-Limb Nerve Explorer</b><span id="ttlB">lumbosacral plexus → foot · electrodiagnostic reference</span></div>
    <div class="search">
      <input id="q" type="search" placeholder="Search a muscle, nerve, or site" autocomplete="off">
      <button class="x" id="qx" aria-label="clear">×</button>
    </div>
    <div class="chips" id="rootchips"><span class="lab" id="rootlab">Root</span></div>
    <div class="toggles">
      <button class="tg" data-t="motor"><span class="dot"></span><span class="tgl" data-k="tMotor">Motor</span></button>
      <button class="tg" data-t="sensory"><span class="dot"></span><span class="tgl" data-k="tSens">Sensory</span></button>
      <button class="tg" data-t="pass"><span class="dot"></span><span class="tgl" data-k="tPass">Passage</span></button>
      <button class="tg" data-t="pearl"><span class="dot"></span><span class="tgl" data-k="tPearl">Pearls</span></button>
    </div>
    <button class="ghost langon" id="langBtn">Français</button>
    <button class="ghost" id="reset">Reset</button>
    <button class="ghost" id="printbtn" title="Print / save as PDF">Print / PDF</button>
  </div>
  <div class="status" id="status"></div>
</header>

<main>
  <!-- ============ PLEXUS NAVIGATOR ============ -->
  <div class="nav-wrap">
    <span class="hint" id="hint"></span>
    <svg class="braid" id="braid" viewBox="0 0 1080 760" role="img" aria-label="Lumbosacral plexus navigator">
      <g id="segs"></g><g id="branches"></g><g id="nodes"></g>
    </svg>
  </div>
  <div class="plexpanel" id="plexpanel" hidden></div>

  <!-- ============ STUDY PLANNER ============ -->
  <div class="eyebrow" id="ebPlan"></div>
  <div class="planbar" id="planbar"></div>
  <div class="planpanel" id="planpanel" hidden></div>

  <!-- ============ COMPRESSION / ENTRAPMENT MAP ============ -->

  <div class="usnote" id="usnote" hidden></div>
  <div class="plexpanel" id="proxpanel" hidden></div>

  <!-- ============ LESION EXPLORER ============ -->
  <div class="eyebrow" id="ebLesion"></div>
  <div class="lesionbar" id="lesionbar"></div>
  <div class="lesionpanel" id="lesionpanel" hidden></div>

  <!-- ============ FOOT-DROP DIFFERENTIAL MATRIX ============ -->
  <div class="eyebrow" id="ebFd"></div>

  <!-- ============ ROOTS ============ -->
  <div class="eyebrow" id="ebRoots"></div>
  <div class="roots" id="roots"></div>

  <!-- ============ NERVE CARDS ============ -->
  <div class="eyebrow" id="ebNerves"></div>
  <div class="grid" id="grid"></div>

  <!-- ============ NCS REFERENCE ============ -->
  <div class="eyebrow" id="ebNcs"></div>
  <div class="ncswrap"><table class="ncs" id="ncstable"></table></div>
  <div class="ncsnotes" id="ncsnotes"></div>

  <!-- ============ EPONYMS / NAMED SYNDROMES ============ -->
  <div class="eyebrow" id="ebEpon"></div>
  <div class="eponyms" id="eponyms"></div>

  <!-- ============ QUIZ / SELF-TEST ============ -->
  <div class="eyebrow" id="ebQuiz"></div>
  <div class="quizbar" id="quizbar"></div>
  <div class="quiz" id="quiz"></div>
</main>

<footer id="foot"></footer>

  pass:[["Under inguinal ligament, ~1–2 cm medial to ASIS","Sous le lig. inguinal, ~1–2 cm médial à l'EIAS","tight belts, obesity, pregnancy, seatbelt, iliac bone-graft","ceintures serrées, obésité, grossesse, ceinture de sécurité, greffe iliaque"]],
  sensory:[m(["Lateral & anterolateral thigh","Cuisse latérale & antéro-latérale","L2,L3","pure sensory — no muscle","purement sensitif — aucun muscle"])],
  pearls:[["Pure sensory. Burning, numb lateral-thigh patch worse on standing / hip extension = meralgia paresthetica; needle EMG is NORMAL, the LFCN SNAP is abnormal (technically hard — compare sides; absent in ~8% of normals).",
           "Purement sensitif. Plaque brûlante/engourdie de la cuisse latérale, pire debout / en extension de hanche = méralgie paresthésique ; l'EMG à l'aiguille est NORMAL, le potentiel sensitif du NCLC est anormal (difficile — comparer les côtés ; absent chez ~8 % des sujets normaux)."],
          ["The nerve lies within 2 cm medial to the ASIS in >80%. Rarely a pelvic mass or high lumbar-plexus lesion mimics it — check the iliacus/adductors are normal.",
           "Le nerf est à ≤2 cm médial à l'EIAS chez >80 %. Rarement une masse pelvienne ou une lésion haute du plexus lombaire le mime — vérifier iliaque/adducteurs normaux."]]},

 /* 3 — femoral */
 {id:"femoral",name:"Femoral n.",namef:"N. fémoral",level:"L2–L4",
  div:["Lumbar plexus — posterior divisions (L2–L4)","Plexus lombaire — div. postérieures (L2–L4)"],
  motor:[m(["Iliacus","Iliaque","L2,L3","branches ABOVE the inguinal ligament","rameaux AU-DESSUS du lig. inguinal"])],
  pass:[["Under the inguinal ligament","Sous le ligament inguinal","retroperitoneal / psoas haematoma (anticoag., haemophilia), lithotomy, hip/pelvic surgery","hématome rétro-péritonéal / du psoas (anticoag., hémophilie), lithotomie, chirurgie hanche/pelvienne"]],
  sub:[{tag:"ant. div.",name:"Anterior division",namef:"Division antérieure",level:"L2–L4",
        motor:[m(["Sartorius","Sartorius","L2,L3","",""]),m(["Pectineus","Pectiné","L2,L3","",""])],
        sensory:[m(["Medial & intermediate cutaneous nn. of thigh","Nn. cutanés méd. & interméd. de la cuisse","L2,L3,(L4)","anterior/medial thigh","cuisse antérieure/médiale"])]},
       {tag:"post. div.",name:"Posterior division",namef:"Division postérieure",level:"L2–L4",
        motor:[m(["Rectus femoris","Droit fémoral","L2,L3,L4","",""]),m(["Vastus lateralis","Vaste latéral","L3,L4","",""]),m(["Vastus intermedius","Vaste intermédiaire","L3,L4","",""]),m(["Vastus medialis","Vaste médial","L3,L4","",""])],
        sensory:[m(["Saphenous n. → medial leg","N. saphène → jambe médiale","L3,L4","exits the adductor (Hunter) canal — pure sensory","sort du canal des adducteurs (Hunter) — purement sensitif"])]}],
  pearls:[["Buckling knee + absent patellar reflex + quadriceps wasting. If the iliacus and hip flexion are SPARED, the lesion is below the inguinal ligament; if iliopsoas is weak too, it is proximal (plexus / root).",
           "Dérobement du genou + réflexe rotulien aboli + fonte du quadriceps. Si l'iliaque et la flexion de hanche sont ÉPARGNÉS, la lésion est sous le lig. inguinal ; si l'ilio-psoas est faible, elle est proximale (plexus / racine)."],
          ["Saphenous is pure-sensory (medial leg/calf). An isolated saphenous SNAP loss with normal strength = distal saphenous / adductor-canal lesion, often post knee surgery.",
           "Le saphène est purement sensitif (jambe/mollet médial). Une perte isolée du potentiel saphène avec force normale = lésion distale du saphène / canal des adducteurs, souvent post-chirurgie du genou."],
          ["Diabetic amyotrophy (Bruns–Garland) mimics a femoral neuropathy but is a lumbosacral radiculoplexopathy — check adductors (obturator) and paraspinals too. Retroperitoneal/psoas haematoma gives an acute painful femoral > obturator/LFCN palsy, hip held flexed & externally rotated.",
           "L'amyotrophie diabétique (Bruns–Garland) mime une neuropathie fémorale mais est une radiculoplexopathie lombo-sacrée — vérifier aussi adducteurs (obturateur) et paraspinaux. L'hématome rétro-péritonéal/du psoas donne une atteinte fémorale > obturatrice/NCLC aiguë et douloureuse, hanche fléchie & en rotation externe."]]},

 /* 3b — saphenous (dedicated sensory box + braid bubble) */
 {id:"saphenous",name:"Saphenous n.",namef:"N. saphène",level:"L3–L4",
  div:["Femoral — terminal SENSORY branch (posterior division)","Fémoral — branche SENSITIVE terminale (division postérieure)"],
  pass:[["Adductor (Hunter) canal → pierces the fascia at the medial knee","Canal des adducteurs (Hunter) → perce le fascia au genou médial","knee surgery / arthroscopy, saphenous-vein harvest, entrapment at the canal","chirurgie / arthroscopie du genou, prélèvement de la veine saphène, compression au canal"]],
  sensory:[m(["Medial leg → medial ankle / foot","Jambe médiale → cheville / pied médial","L3,L4","the distal continuation of the femoral — pure sensory","prolongement distal du fémoral — purement sensitif"]),
           m(["Infrapatellar branch → medial knee","Rameau infrapatellaire → genou médial","L3,L4","often injured in knee surgery","souvent lésé en chirurgie du genou"])],
  pearls:[["Pure sensory, medial leg / calf. An isolated saphenous SNAP loss with NORMAL strength and a normal quadriceps = distal saphenous / adductor-canal lesion — commonly post knee surgery or vein harvest, NOT a femoral neuropathy or an L4 root.","Purement sensitif, jambe / mollet médial. Une perte isolée du potentiel saphène avec force NORMALE et quadriceps normal = lésion distale du saphène / canal des adducteurs — souvent post-chirurgie du genou ou prélèvement veineux, PAS une neuropathie fémorale ni une racine L4."],
          ["It is the ONLY below-knee cutaneous territory on the medial side that is not sciatic — the key to separate a saphenous lesion from an L4 radiculopathy (check the vastus medialis and adductors, which are spared in a pure saphenous lesion).","C'est le SEUL territoire cutané sous le genou du côté médial qui n'est pas sciatique — la clé pour séparer une lésion du saphène d'une radiculopathie L4 (vérifier vaste médial et adducteurs, épargnés dans une atteinte purement saphène)."]]},
 /* 4 — obturator */
 {id:"obturator",name:"Obturator n.",namef:"N. obturateur",level:"L2–L4",
  div:["Lumbar plexus — anterior divisions (L2–L4)","Plexus lombaire — div. antérieures (L2–L4)"],
  pass:[["Obturator canal","Canal obturateur","pelvic mass, obturator hernia, hip surgery, labour","masse pelvienne, hernie obturatrice, chirurgie de hanche, accouchement"]],
  motor:[m(["Adductor longus","Long adducteur","L2,L3,L4","",""]),m(["Adductor brevis","Court adducteur","L2,L3,L4","",""]),m(["Gracilis","Gracile","L2,L3,L4","",""]),m(["Adductor magnus (deep)","Grand adducteur (prof.)","L2,L3,L4","dual — also sciatic/tibial","double — aussi sciatique/tibial"]),m(["Obturator externus","Obturateur externe","L3,L4","",""])],
  sensory:[m(["Small medial-thigh patch","Petite zone cuisse médiale","L2,L3,L4","often absent","souvent absent"])],
  pearls:[["Adductor weakness (legs cross poorly) + medial-thigh pain with a NORMAL quadriceps and preserved patellar reflex → obturator, not femoral or an L3–L4 root.",
           "Faiblesse des adducteurs (jambes se croisent mal) + douleur cuisse médiale avec quadriceps NORMAL et réflexe rotulien préservé → obturateur, pas fémoral ni racine L3–L4."],
          ["Abnormal adductors put a lumbar-plexus lesion at/proximal to the plexus and exclude an isolated femoral neuropathy. Adductor magnus is dual-innervated (obturator + sciatic-tibial).",
           "Des adducteurs anormaux placent la lésion au/proximal au plexus lombaire et excluent une neuropathie fémorale isolée. Le grand adducteur a une double innervation (obturateur + sciatique-tibial)."]]},

 /* 5 — superior gluteal */
 {id:"supglut",name:"Superior gluteal n.",namef:"N. glutéal supérieur",level:"L4–S1",
  div:["Sacral plexus — posterior division","Plexus sacré — div. postérieure"],
  pass:[["Suprapiriform foramen","Foramen suprapiriforme","posterior hip approach, deep IM injection","abord postérieur de hanche, injection IM profonde"]],
  motor:[m(["Gluteus medius","Moyen glutéal","(L4),L5,(S1)","",""]),m(["Gluteus minimus","Petit glutéal","(L4),L5,(S1)","",""]),m(["Tensor fasciae latae","Tenseur du fascia lata","(L4),L5,(S1)","",""])],
  pearls:[["Trendelenburg gait / pelvic drop on the swing side = hip-abductor (gluteus medius) weakness → superior gluteal (or L5). Purely motor — no sensory loss. Gluteal denervation puts a lesion at/proximal to the plexus (excludes an isolated sciatic).",
           "Démarche de Trendelenburg / chute pelvienne du côté oscillant = faiblesse des abducteurs (moyen glutéal) → glutéal sup. (ou L5). Purement moteur — aucun déficit sensitif. Une dénervation glutéale place la lésion au/proximal au plexus (exclut un sciatique isolé)."]]},

 /* 6 — inferior gluteal */
 {id:"infglut",name:"Inferior gluteal n.",namef:"N. glutéal inférieur",level:"L5–S2",
  div:["Sacral plexus — posterior division","Plexus sacré — div. postérieure"],
  motor:[m(["Gluteus maximus","Grand glutéal","(L5),S1,(S2)","",""])],
  pearls:[["Difficulty rising from a chair / climbing stairs + weak hip extension → gluteus maximus (inferior gluteal, S1). Purely motor. Like the superior gluteal, its involvement localises at/proximal to the sacral plexus.",
           "Difficulté à se lever d'une chaise / monter les escaliers + extension de hanche faible → grand glutéal (glutéal inf., S1). Purement moteur. Comme le glutéal sup., son atteinte localise au/proximal au plexus sacré."]]},

 /* 6b — sacral-plexus short-rotator (collateral) muscular branches */
 {id:"npiri",name:"Nerve to piriformis",namef:"Nerf du piriforme",level:"S1–S2",
  div:["Sacral plexus — direct muscular (collateral) branch","Plexus sacré — rameau musculaire direct (collatéral)"],
  motor:[m(["Piriformis","Piriforme","S1,S2","hip external rotator; the sciatic exits just below it","rotateur externe de hanche ; le sciatique sort juste en dessous"])],
  pearls:[["The sciatic nerve emerges just below piriformis (variant: through / above it). 'Piriformis syndrome' is over-diagnosed — most 'sciatica' is lumbosacral radiculopathy, not sciatic neuropathy. No routine EDX confirms it (proposed: FAIR-position H-reflex delay).","Le sciatique émerge juste sous le piriforme (variante : à travers / au-dessus). Le « syndrome du piriforme » est sur-diagnostiqué — la plupart des « sciatiques » sont des radiculopathies lombo-sacrées, pas des neuropathies sciatiques. Aucun EDX de routine ne le confirme (proposé : retard du réflexe H en position FAIR)."]]},
 {id:"nqf",name:"N. to quadratus femoris & inf. gemellus",namef:"Nerf du carré fémoral & jumeau inf.",level:"L4–S1",
  div:["Sacral plexus — direct muscular (collateral) branch","Plexus sacré — rameau musculaire direct (collatéral)"],
  motor:[m(["Quadratus femoris","Carré fémoral","L4,L5,S1","hip external rotator","rotateur externe de hanche"]),m(["Inferior gemellus","Jumeau inférieur","L4,L5,S1","",""])],
  pearls:[["Short external rotator supplied DIRECTLY by the sacral plexus (L4–S1), deep to the sciatic — not by the sciatic itself. Rarely tested in EDX; useful anatomically to complete the sacral-plexus map.","Court rotateur externe innervé DIRECTEMENT par le plexus sacré (L4–S1), profond au sciatique — pas par le sciatique lui-même. Rarement testé en EDX ; utile pour compléter la carte du plexus sacré."]]},
 {id:"nobti",name:"N. to obturator internus & sup. gemellus",namef:"Nerf de l'obturateur interne & jumeau sup.",level:"L5–S2",
  div:["Sacral plexus — direct muscular (collateral) branch","Plexus sacré — rameau musculaire direct (collatéral)"],
  motor:[m(["Obturator internus","Obturateur interne","L5,S1,S2","hip external rotator","rotateur externe de hanche"]),m(["Superior gemellus","Jumeau supérieur","L5,S1,S2","",""])],
  pearls:[["Completes the trio of short-rotator nerves (piriformis; quadratus femoris / inf. gemellus; obturator internus / sup. gemellus), all direct sacral-plexus branches. Despite the name it is NOT the obturator nerve (which is lumbar, to the adductors).","Complète le trio des nerfs des courts rotateurs (piriforme ; carré fémoral / jumeau inf. ; obturateur interne / jumeau sup.), tous rameaux directs du plexus sacré. Malgré le nom, ce n'est PAS le nerf obturateur (lombaire, pour les adducteurs)."]]},
 /* 7 — sciatic (parent) */
 {id:"sciatic",name:"Sciatic n.",namef:"N. sciatique",level:"L4–S3",span:true,
  div:["Sacral plexus — two divisions: peroneal (posterior) + tibial (anterior)","Plexus sacré — deux divisions : fibulaire (post.) + tibiale (ant.)"],
  pass:[["Greater sciatic foramen, under piriformis","Grand foramen sciatique, sous le piriforme","hip fracture/dislocation & arthroplasty (retraction, cement), IM injection, prolonged sitting/coma, mass (schwannoma, lymphoma), vasculitis","fracture/luxation de hanche & arthroplastie (rétraction, ciment), injection IM, position assise prolongée/coma, masse (schwannome, lymphome), vascularite"]],
  motor:[m(["Semitendinosus","Semi-tendineux","L5,S1","tibial division","division tibiale"]),m(["Semimembranosus","Semi-membraneux","L5,S1","tibial division","division tibiale"]),m(["Biceps femoris — long head","Biceps fém. — chef long","(L5),S1,(S2)","tibial division","division tibiale"]),m(["Biceps femoris — SHORT head","Biceps fém. — chef COURT","(L5),S1,(S2)","peroneal div. — the ONLY thigh muscle in the peroneal division","div. fibulaire — le SEUL muscle de cuisse de la div. fibulaire"]),m(["Adductor magnus (½)","Grand adducteur (½)","L4,L5","tibial div. (also obturator)","div. tibiale (aussi obturateur)"])],
  pearls:[["A sciatic lesion mimics a peroneal palsy (foot drop) but ALSO weakens tibial-innervated muscles + hamstrings, and the ankle reflex may be lost. Peroneal fibres lie laterally/posteriorly and are more vulnerable — so foot drop usually dominates.",
           "Une lésion sciatique mime une paralysie fibulaire (pied tombant) mais atteint AUSSI les muscles tibiaux + ischio-jambiers, et le réflexe achilléen peut être aboli. Les fibres fibulaires (latérales/postérieures) sont plus vulnérables — d'où la prédominance du pied tombant."],
          ["The SHORT head of biceps femoris is the key localiser: the only peroneal-division muscle above the fibular neck. Involved short head → sciatic / plexus; spared short head with a foot drop → common fibular at the neck. Sample tibialis posterior/FDL (tibial L5) and the glutei to complete the localisation.",
           "Le chef COURT du biceps fémoral est le localisateur clé : seul muscle de la div. fibulaire au-dessus du col fibulaire. Chef court atteint → sciatique / plexus ; chef court épargné avec pied tombant → fibulaire commun au col. Échantillonner tib. postérieur/LFO (tibial L5) et les glutéaux pour compléter."],
          ["Piriformis syndrome is over-diagnosed: most 'sciatica' is lumbosacral radiculopathy, not sciatic neuropathy. The FAIR-position H-reflex delay is the only proposed test.",
           "Le syndrome du piriforme est sur-diagnostiqué : la plupart des « sciatiques » sont des radiculopathies lombo-sacrées, pas des neuropathies sciatiques. Le retard du réflexe H en position FAIR est le seul test proposé."]]},

 /* 8 — common fibular (peroneal) */
 {id:"peroneal",name:"Common fibular (peroneal) n.",namef:"N. fibulaire (péronier) commun",level:"L4–S2",
  div:["Sciatic — peroneal (posterior) division","Sciatique — division fibulaire (postérieure)"],
  pass:[["Fibular neck","Col de la fibula","crossed legs, casts/braces, rapid weight loss ('slimmer's palsy'), prolonged squatting","jambes croisées, plâtres/orthèses, amaigrissement rapide (« paralysie des amaigris »), accroupissement prolongé"]],
  motor:[m(["Biceps femoris — short head","Biceps fém. — chef court","(L5),S1","above the neck — spared at the fibular neck","au-dessus du col — épargné au col fibulaire"])],
  sub:[{tag:"deep",name:"Deep fibular n.",namef:"N. fibulaire profond",level:"L4–S1",
        motor:[m(["Tibialis anterior","Tibial antérieur","L4,L5","dorsiflexion","dorsiflexion"]),m(["EDL","LEO","L4,L5","",""]),m(["EHL","LEH","L5,(S1)","",""]),m(["Peroneus tertius","3e fibulaire","L5,S1","",""]),m(["EDB / EHB","CEO / CEH","L5,S1","",""])],
        sensory:[m(["1st web space","1er espace interdigital","L5","only cutaneous territory","seul territoire cutané"])]},
       {tag:"superf.",name:"Superficial fibular n.",namef:"N. fibulaire superficiel",level:"L4–S1",
        motor:[m(["Peroneus longus","Long fibulaire","L5,(S1)","eversion","éversion"]),m(["Peroneus brevis","Court fibulaire","L5,(S1)","eversion","éversion"])],
        sensory:[m(["Anterolateral leg + dorsum of foot","Jambe antéro-lat. + dos du pied","L5","","",""])]}],
  pearls:[["Foot drop that SPARES inversion (tibialis posterior = tibial) and the ankle reflex = common fibular at the neck. If inversion is also weak, think L5 or sciatic — not fibular.",
           "Pied tombant qui ÉPARGNE l'inversion (tib. postérieur = tibial) et le réflexe achilléen = fibulaire commun au col. Si l'inversion est faible aussi, penser L5 ou sciatique — pas fibulaire."],
          ["Record tibialis anterior (not only EDB) when stimulating across the fibular neck — conduction block / focal slowing there is often missed on EDB alone.",
           "Enregistrer le tibial antérieur (pas seulement le CEO) en stimulant au col fibulaire — le bloc de conduction / ralentissement focal y est souvent manqué sur le seul CEO."],
          ["Deep = dorsiflexors + 1st web space; superficial = evertors + anterolateral leg/dorsum. Weak eversion with preserved dorsiflexion points to the superficial branch (or a peroneus-sparing L5).",
           "Profond = dorsifléchisseurs + 1er espace ; superficiel = éverseurs + jambe antéro-lat./dos. Éversion faible avec dorsiflexion préservée → rameau superficiel (ou L5 épargnant les fibulaires)."]]},

 /* 9 — tibial */
 {id:"tibial",name:"Tibial n.",namef:"N. tibial",level:"L4–S3",span:true,
  div:["Sciatic — tibial (anterior) division","Sciatique — division tibiale (antérieure)"],
  pass:[["Popliteal fossa / soleal arch","Fosse poplitée / arcade du soléaire","Baker's cyst, trauma — proximal tibial lesions are uncommon","kyste de Baker, trauma — les lésions tibiales proximales sont rares"]],
  motor:[m(["Gastrocnemius","Gastrocnémien","S1,S2","plantarflexion (S1 reflex)","flexion plantaire (réflexe S1)"]),m(["Soleus","Soléaire","S1,S2","H-reflex muscle","muscle du réflexe H"]),m(["Tibialis posterior","Tibial postérieur","L5,S1","inversion — the key non-peroneal L5","inversion — L5 non fibulaire clé"]),m(["FDL","LFO","L5,S1","",""]),m(["FHL","LFH","S1,S2","",""]),m(["Popliteus","Poplité","L5,S1","",""])],
  sub:[{tag:"br.",name:"Sural n.",namef:"N. sural",level:"S1–S2",
        sensory:[m(["Posterolateral leg + lateral foot","Jambe post-lat. + bord lat. du pied","S1,S2","the S1 SNAP to check in radiculopathy","le potentiel S1 à vérifier en radiculopathie"])]},
       {tag:"br.",name:"Medial calcaneal n.",namef:"N. calcanéen médial",level:"S1–S2",
        sensory:[m(["Heel","Talon","S1,S2","separate branch — often SPARED in tarsal tunnel","rameau séparé — souvent ÉPARGNÉ dans le tunnel tarsien"])]},
       {tag:"br.",name:"Medial plantar n. — 'median of the foot'",namef:"N. plantaire médial — « médian du pied »",level:"L5–S2",
        motor:[m(["Abductor hallucis","Abd. de l'hallux","S1,S2","",""]),m(["FDB","CFO","S1,S2","",""]),m(["FHB","CFH","S1,S2","",""]),m(["Lumbrical 1","1er lombrical","S1,S2","",""])],
        sensory:[m(["Medial 3½ toes (sole)","3½ orteils médiaux (plante)","L5,S1","",""])]},
       {tag:"br.",name:"Lateral plantar n. — 'ulnar of the foot'",namef:"N. plantaire latéral — « ulnaire du pied »",level:"S1–S2",
        motor:[m(["Abductor digiti minimi","Abd. du petit orteil","S1,S2","Baxter's 1st branch","1er rameau de Baxter"]),m(["Interossei","Interosseux","S1,S2","",""]),m(["Adductor hallucis","Add. de l'hallux","S1,S2","",""]),m(["Quadratus plantae","Carré plantaire","S1,S2","",""]),m(["Lumbricals 2–4","Lombricaux 2–4","S1,S2","",""])],
        sensory:[m(["Lateral 1½ toes (sole)","1½ orteil latéral (plante)","S1,S2","",""])]}],
  passTarsal:[["Tarsal tunnel (behind medial malleolus)","Tunnel tarsien (arrière malléole médiale)","burning sole, +Tinel; splits into medial & lateral plantar nn.","brûlure plantaire, Tinel + ; se divise en nn. plantaires médial & latéral"],["Baxter (1st br. of lateral plantar)","Baxter (1er rameau du plant. lat.)","chronic heel pain mimicking plantar fasciitis; may denervate ADM","talalgie chronique mimant une fasciite ; peut dénerver l'ADM"]],
  pearls:[["Tarsal tunnel = distal tibial entrapment: burning/tingling sole worse on standing, +Tinel behind the medial malleolus. The medial calcaneal branch (separate) is often spared, so the heel can feel normal.",
           "Tunnel tarsien = entrapment tibial distal : brûlure/picotement de la plante, pire debout, Tinel + derrière la malléole médiale. Le rameau calcanéen médial (séparé) est souvent épargné, d'où un talon normal."],
          ["Baxter's neuropathy (1st branch of the lateral plantar) → chronic heel pain resistant to plantar-fasciitis care; look for isolated ADM denervation on EMG.",
           "Neuropathie de Baxter (1er rameau du plantaire latéral) → talalgie chronique résistant au traitement de la fasciite ; chercher une dénervation isolée de l'ADM à l'EMG."],
          ["The ankle jerk / H-reflex (gastroc-soleus, S1) tracks tibial & S1 integrity. Proximal tibial lesions are uncommon; think sciatic or S1 root when calf + foot are both involved.",
           "Le réflexe achilléen / réflexe H (gastroc-soléaire, S1) suit l'intégrité tibiale & S1. Les lésions tibiales proximales sont rares ; penser sciatique ou racine S1 si mollet + pied atteints."]]},

 /* 9b — sural (dedicated sensory box) */
 {id:"sural",name:"Sural n.",namef:"N. sural",level:"S1–S2",
  div:["Sensory only — medial sural cutaneous (tibial) + lateral sural cutaneous / peroneal communicating (common fibular)","Sensitif seulement — cutané sural médial (tibial) + cutané sural latéral / communicant fibulaire (fibulaire commun)"],
  sensory:[m(["Posterolateral distal leg + lateral foot / 5th toe","Jambe distale postéro-lat. + bord latéral du pied / 5e orteil","S1,S2","the sural proper, after the two roots join","le sural proprement dit, après union des deux racines"]),
           m(["Medial sural cutaneous → posterior (central) calf","Cutané sural médial → mollet postérieur (central)","S1,S2","from the TIBIAL nerve in the popliteal fossa","du nerf TIBIAL dans la fosse poplitée"]),

function seg(x1,y1,x2,y2,cls,path,lv){
  const mx=(x1+x2)/2;
  const p=document.createElementNS(SVGNS,"path");
  p.setAttribute("d",`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
  p.setAttribute("class","seg "+(cls||""));
  if(path)p.dataset.path=path; if(lv)p.dataset.lv=lv;
  segG.appendChild(p); return p;
}

function plexChip(x,y,label,elself,lv){

const PILL={};
function termPill(id){

function divPill(id,x,y){

/* labelled muscle tap: a connector from (sx,sy) to a dot at (dx,dy) + 1–2 line label */
function tap(sx,sy,dx,dy,path,label,sub,anchor,nerve){
  anchor=anchor||"start";
  const c=document.createElementNS(SVGNS,"path");
  const mx=(sx+dx)/2;
  c.setAttribute("d",`M${sx},${sy} C${mx},${sy} ${mx},${dy} ${dx},${dy}`);
  c.setAttribute("class","seg muscle"); c.dataset.path=path; c.dataset.lv=path.split(" ").flatMap(p=>NROOTS[p]||[]).join(" ");
  segG.appendChild(c);
  const g=document.createElementNS(SVGNS,"g"); g.setAttribute("class","node tap"+(nerve?" tap-on":"")); g.dataset.path=path; g.dataset.lv=c.dataset.lv;
  if(nerve)g.dataset.nerve=nerve;
  const tx0=anchor==="end"?dx-8:dx+8;
  let txt;
  if(sub){txt=`<text text-anchor="${anchor}"><tspan class="mk" x="${tx0}" y="${dy-4}">${label}</tspan>`+
             `<tspan class="mk2" x="${tx0}" y="${dy+8}">${sub}</tspan></text>`;}
  else{txt=`<text class="mk" x="${tx0}" y="${dy}" text-anchor="${anchor}" dominant-baseline="central">${label}</text>`;}
  g.innerHTML=`<circle cx="${dx}" cy="${dy}" r="3.1" fill="${COLOR[path.split(' ')[0]]||'#8f2f8f'}"></circle>`+txt;

function markerNode(x,y,label,path,color,nerve){

}

/* =================== BUILD (rerun on language switch) =================== */
function buildBraid(){
  segG.innerHTML=""; nodeG.innerHTML=""; brG.innerHTML="";
  for(const k in PILL) delete PILL[k];

  colHeaders();

  /* --- FEEDERS: roots → hubs (+ LS trunk) --- */
  ["L1","L2","L3","L4"].forEach(r=>{
    const nv=nervesAtRootHub(r,"lumbar");
    seg(COL.roots,ROOTY[r],HUB.lumbar[0],HUB.lumbar[1],"feeder",nv.join(" "),r);
  });
  const lstNv=[...new Set([...nervesAtRootHub("L4","sacral"),...nervesAtRootHub("L5","sacral")])];
  seg(COL.roots,ROOTY.L4,LSTPOS[0],LSTPOS[1],"feeder",nervesAtRootHub("L4","sacral").join(" "),"L4");
  seg(COL.roots,ROOTY.L5,LSTPOS[0],LSTPOS[1],"feeder",nervesAtRootHub("L5","sacral").join(" "),"L5");
  seg(LSTPOS[0],LSTPOS[1],HUB.sacral[0],HUB.sacral[1],"feeder",lstNv.join(" "),"L4 L5");
  ["S1","S2","S3","S4"].forEach(r=>{
    const nv=nervesAtRootHub(r,"sacral");
    seg(COL.roots,ROOTY[r],HUB.sacral[0],HUB.sacral[1],"feeder",nv.join(" "),r);
  });

  /* --- hub → terminal nerve trunks --- */
  ["abdgen","lfcn","femoral","obturator","supglut","infglut","sciatic","pcnt","pudendal"].forEach(id=>{
    const[nx,ny,post]=NEND[id];
    const hub=NHUB[id]==="lumbar"?HUB.lumbar:HUB.sacral;
    const path=(id==="sciatic")?"sciatic peroneal tibial":id;
    seg(hub[0],hub[1],nx,ny,post?"post":"",path,NLV(id));
  });

  /* --- terminal pills --- */
  ["abdgen","lfcn","femoral","obturator","supglut","infglut","sciatic","pcnt","pudendal"].forEach(termPill);
  const perX=COL.knee+16;
  const tibX2=divPill("tibial",COL.knee,470);        /* TIBIAL is the upper branch */
  const perX2=divPill("peroneal",perX,540);          /* COMMON FIBULAR sits below the tibial */

  /* --- SCIATIC: split → tibial (upper) + fibular (lower), then division-specific branches --- */
  const sc=PILL.sciatic;
  seg(sc.x2,sc.y, COL.knee,470,"","sciatic tibial","L4 L5 S1 S2 S3");      /* upper = tibial */
  seg(sc.x2,sc.y, perX,540,"post","sciatic peroneal","L4 L5 S1 S2");       /* lower = fibular */
  /* TIBIAL-division hamstrings, in the band between the two pills */
  tap(sc.x+34,sc.y+12, 470,514, "sciatic tibial",
      tx("Hamstrings","Ischio-jambiers"), tx("ST · SM · BF long head","ST · SM · BF long"),"start");

  /* --- ADDUCTOR MAGNUS: dual innervation — obturator (adductor part, L2–4) + tibial division of
     the sciatic (ischiocondylar part, L4). With the tibial branch on top, its feeder now reaches
     the shared node straight from behind the tibial box — no crossing behind the fibular. --- */
  const amX=655, amY=400, ox=PILL.obturator.x2+30;
  /* drop straight down from the posterior-branch dot first (clears the "obt. externus" label),
     then curve to the shared node (passing right of the sup. gluteal label) */
  segPath(`M${ox},262 C${ox},290 ${amX},300 ${amX},${amY}`, "muscle","obturator","L2 L3 L4");
  seg(595,458, amX,amY, "muscle","sciatic tibial","L4 L5");                /* from the tibial box top */
  markerNode(amX,amY, tx("Adductor magnus","Grand adducteur"), "obturator sciatic tibial", "#7a8290");

  /* --- TIBIAL (upper): course gently descends → tarsal tunnel → medial/lateral plantar --- */
  seg(tibX2,470, COL.leg,490,"","tibial","L4 L5 S1 S2");
  seg(COL.leg,490, COL.ankle,505,"","tibial","L5 S1 S2");
  seg(COL.ankle,505, COL.foot,484,"","tibial","L5 S1");
  seg(COL.ankle,505, COL.foot,536,"","tibial","S1 S2");
  markerNode(COL.ankle,505, tx("tarsal tunnel","tunnel tarsien"), "tibial", "#2c8a5f");
  tap(COL.leg+4,490, COL.leg+4,466, "tibial",
      tx("Tibial — calf","Tibial — mollet"), tx("gastroc·sol·tib.post","gastroc·sol·tib.post"),"start");
  tap(COL.foot,484, COL.foot,484, "tibial",
      tx("Medial plantar","Plant. médial"), tx("AbdH · FDB","AbdH · CFO"),"start");
  tap(COL.foot,536, COL.foot,536, "tibial",
      tx("Lateral plantar","Plant. latéral"), tx("ADM · interossei","ADM · interosseux"),"start");

  /* --- COMMON FIBULAR (lower): deep + superficial exit from the right edge; BF short head off the top --- */
  tap(perX2,540, COL.leg+50,524, "peroneal",
      tx("Deep fibular","Fibul. profond"), tx("TA·EDL·EHL·EDB","TA·LEO·LEH·CEO"),"start");
  tap(perX2,540, COL.leg+50,562, "peroneal",
      tx("Superficial fibular","Fibul. superficiel"), tx("peroneus long./brevis","long/court fibulaire"),"start");
  /* PERONEAL-division short head of biceps femoris — off the fibular, proximal to the neck.
     A longer angled connector (real bezier) so the branch reads as attached in the resting state. */
  tap(624,552, 646,582, "sciatic peroneal",
      tx("BF short head","Chef court du biceps"), tx("peroneal division","division fibulaire"),"start");

  /* --- SURAL: confluence fed by BOTH the tibial (from above) and the fibular (from below);
     sits in the gap between the two divisions, left of the fibular branches --- */
  const surX=676, surY=512;
  seg(650,482, surX,surY,"muscle","tibial","S1 S2");
  seg(685,528, surX,surY,"muscle","peroneal","S1 S2");
  markerNode(surX,surY, tx("Sural n. (S1)","N. sural (S1)"), "tibial peroneal sural", "#c2761a", "sural");

  /* --- MUSCLE TAPS for the remaining nerves (proximal → distal) --- */
  /* abdominal/genital — sensory-dominant */
  tap(PILL.abdgen.x2,64, PILL.abdgen.x2+40,64, "abdgen",
      tx("Ab-wall · cremaster","Paroi abdo · crémaster"), tx("+ groin sensory","+ sensitif inguinal"),"start");
  /* LFCN — pure sensory */
  tap(PILL.lfcn.x2,112, PILL.lfcn.x2+34,112, "lfcn",
      tx("Lateral thigh","Cuisse latérale"), tx("pure sensory","purement sensitif"),"start");
  /* FEMORAL: motor above the pill, saphenous exiting distally into the leg */
  tap(PILL.femoral.x2,170, PILL.femoral.x2+30,148, "femoral",
      tx("Iliopsoas · quadriceps","Ilio-psoas · quadriceps"), tx("sartorius · pectineus","sartorius · pectiné"),"start");
  seg(PILL.femoral.x2,170, COL.leg,196,"","femoral","L3 L4");
  markerNode(COL.leg,196, tx("Saphenous → medial leg","Saphène → jambe méd."), "femoral saphenous", "#c2761a", "saphenous");
  /* OBTURATOR: anterior + posterior branches */
  tap(PILL.obturator.x2,242, PILL.obturator.x2+30,224, "obturator",
      tx("Ant. branch","Rameau ant."), tx("add. longus/brevis · gracilis","long/court add. · gracile"),"start");
  tap(PILL.obturator.x2,242, PILL.obturator.x2+30,262, "obturator",
      tx("Post. branch","Rameau post."), tx("obturator externus","obturateur externe"),"start");
  /* GLUTEALS */
  tap(PILL.supglut.x2,300, PILL.supglut.x2+30,300, "supglut",
      tx("Glut. med/min · TFL","Moy/petit glut. · TFL"),null,"start");
  tap(PILL.infglut.x2,352, PILL.infglut.x2+30,352, "infglut",
      tx("Gluteus maximus","Grand glutéal"),null,"start");
  /* SHORT EXTERNAL ROTATORS — direct sacral-plexus muscular branches (clickable → cards) */
  tap(HUB.sacral[0],HUB.sacral[1], 322,476, "npiri",
      tx("Piriformis","Piriforme"), tx("n. to piriformis · S1–2","n. du piriforme · S1–2"),"start","npiri");
  tap(HUB.sacral[0],HUB.sacral[1], 322,508, "nqf",
      tx("Quadratus femoris","Carré fémoral"), tx("+ inf. gemellus · L4–S1","+ jumeau inf. · L4–S1"),"start","nqf");
  tap(HUB.sacral[0],HUB.sacral[1], 322,540, "nobti",
      tx("Obturator internus","Obturateur interne"), tx("+ sup. gemellus · L5–S2","+ jumeau sup. · L5–S2"),"start","nobti");
  /* PCNT — sensory */
  tap(PILL.pcnt.x2,614, PILL.pcnt.x2+30,614, "pcnt",
      tx("Posterior thigh","Cuisse postérieure"), tx("sensory","sensitif"),"start");
  /* PUDENDAL */
  tap(PILL.pudendal.x2,662, PILL.pudendal.x2+30,662, "pudendal",
      tx("Ext. anal sphincter","Sphincter anal ext."), tx("· perineum · pelvic floor","· périnée · plancher"),"start");

  /* --- ROOT nodes --- */
  Object.entries(ROOTY).forEach(([k,v])=>rootNode(k,v));

  /* --- PLEXUS chips (clickable → PLEX panels) --- */
  plexChip(HUB.lumbar[0],HUB.lumbar[1],tx("Lumbar plexus","Plexus lombaire"),"LUMB","L1 L2 L3 L4");
  plexChip(HUB.sacral[0],HUB.sacral[1],tx("Sacral plexus","Plexus sacré"),"SACR","L4 L5 S1 S2 S3");
  plexChip(LSTPOS[0],LSTPOS[1],tx("LS trunk","Tronc LS"),"LST","L4 L5");
}
buildBraid();

/* ---- level chips: "L4,L5,(S1)" → chips; parenthesised = minor ---- */
const LVORDER=["L1","L2","L3","L4","L5","S1","S2","S3","S4"];
function parseLevels(str){
  const out=[]; (str||"").split(",").forEach(t=>{
    t=t.trim(); if(!t) return;
    const minor=/^\(.*\)$/.test(t);
    const bare=t.replace(/[()]/g,"").trim();
    if(bare) out.push({lv:bare,minor});
  });
  return out;
}
function lvChips(str){
  return parseLevels(str).map(o=>`<span class="lvl${o.minor?' minor':''}" data-lvl="${o.lv}">${o.lv}</span>`).join("");
}
function normLvl(tok){
  // "L4","S1" -> as-is; bare "3"/"2" inherits the previous token's letter (handled by caller)
  return tok.trim();
}
function levelsToRoots(str){
  const s=new Set();
  parseLevels(str).forEach(o=>{
    let v=o.lv.replace(/–/g,"-").trim();
    if(v.includes("-")){
      let[a,b]=v.split("-").map(x=>x.trim());
      // abbreviated end token (e.g. "L2-4","S1-2"): if b lacks a letter prefix, inherit a's letter
      if(/^[0-9]+$/.test(b)) b=a.replace(/[0-9].*$/,"")+b;
      const i=LVORDER.indexOf(a),j=LVORDER.indexOf(b);
      if(i>=0&&j>=0)LVORDER.slice(Math.min(i,j),Math.max(i,j)+1).forEach(x=>s.add(x));
      else{ if(i>=0)s.add(a); if(j>=0)s.add(b); }
    }
    else if(v) s.add(v);
  });
  return [...s];
}

/* ---- muscle / sensory / passage rows ---- */
function mRow(x,type){
  const nm=tx(x.n,x.nf), note=tx(x.note,x.notef);
  const search=(nm+" "+note).toLowerCase();
  return `<div class="item" data-type="${type}" data-search="${esc(search)}" data-levels="${esc(levelsToRoots(x.l).join(' '))}">`+
    `<span class="mn">${esc(nm)}${note?` <span class="note">— ${esc(note)}</span>`:""}</span>`+
    `<span class="lvls">${lvChips(x.l)}</span></div>`;
}
function secMotor(arr){return arr&&arr.length?`<div class="sec"><div class="sh motor"><span class="sq"></span>${T("motor")}</div>${arr.map(x=>mRow(x,"motor")).join("")}</div>`:"";}
function secSens(arr){return arr&&arr.length?`<div class="sec"><div class="sh sensory"><span class="sq"></span>${T("sensory")}</div>${arr.map(x=>mRow(x,"sensory")).join("")}</div>`:"";}
function passRow(p){
  const nm=tx(p[0],p[1]), note=tx(p[2],p[3]);
  return `<div class="item pass-item" data-type="pass" data-search="${esc((nm+' '+note).toLowerCase())}" data-key="${esc(nm.toLowerCase())}">`+
    `<span class="nm2">${esc(nm)}${note?` <span class="note">— ${esc(note)}</span>`:""}</span></div>`;
}
function secPass(arr){return arr&&arr.length?`<div class="sec"><div class="sh pass"><span class="sq"></span>${T("passage")}</div>${arr.map(passRow).join("")}</div>`:"";}
function secPearl(arr){return arr&&arr.length?`<div class="sec"><div class="sh pearl"><span class="sq"></span>${T("pearls")}</div>${arr.map(p=>{const t=tx(p[0],p[1]);return `<div class="item pearl-item" data-type="pearl" data-search="${esc(t.toLowerCase())}">${esc(t)}</div>`;}).join("")}</div>`:"";}

/* ---- sub-nerve block (deep/superficial fibular, plantar nn., sural...) ---- */
function subBlock(sub){
  return sub.map(s=>{
    const nm=tx(s.name,s.namef);
    return `<div class="sub"><div class="subh" data-search="${esc(nm.toLowerCase())}"><span class="tag">${esc(tx(s.tag||'br.',s.tag||'br.'))}</span>${esc(nm)}`+
      (s.level?`<span class="lv">${esc(s.level)}</span>`:"")+`</div>`+
      secMotor(s.motor)+secSens(s.sensory)+`</div>`;
  }).join("");
}

/* ---- distal branch TREE (bilingual port of the UE engine) ---- */
function nlab(n){return tx(n.label[0],n.label[1]);}
function nnote(n){return n.note?tx(n.note[0],n.note[1]):"";}
function nodeW(n){
  const t=nlab(n).length+(n.level?n.level.length+1:0), nl=nnote(n).length;
  return Math.min(250,Math.max(108,Math.max(t*6.6,nl*5.4)+22));
}
function buildTree(root){
  let leaf=0; const rowH=48; const nodes=[];
  (function place(n,depth){
    n._depth=depth; n._w=nodeW(n); nodes.push(n);
    if(n.children&&n.children.length){n.children.forEach(c=>place(c,depth+1));
      n._cy=(n.children[0]._cy+n.children[n.children.length-1]._cy)/2;}
    else{n._cy=leaf*rowH+rowH/2;leaf++;}
  })(root,0);
  const maxD=Math.max(...nodes.map(n=>n._depth));
  const colW=[],colX=[];let acc=6;const gap=28;
  for(let d=0;d<=maxD;d++)colW[d]=Math.max(...nodes.filter(n=>n._depth===d).map(n=>n._w));
  for(let d=0;d<=maxD;d++){colX[d]=acc;acc+=colW[d]+gap;}
  nodes.forEach(n=>n._x=colX[n._depth]);
  return {nodes,W:acc-gap+6,H:Math.max(1,leaf)*rowH+6};
}
function renderTree(root,cardId){
  const {nodes,W,H}=buildTree(root);
  let s=`<svg viewBox="0 0 ${Math.round(W)} ${Math.round(H)}" xmlns="http://www.w3.org/2000/svg" style="width:100%;min-width:${Math.round(Math.min(W,560))}px;height:auto;display:block;font-family:var(--sans)">`;
  nodes.forEach(n=>{if(n.children)n.children.forEach(c=>{
    const x1=n._x+n._w,y1=n._cy,x2=c._x,y2=c._cy,mx=(x1+x2)/2;
    s+=`<path d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" fill="none" stroke="#cfd6df" stroke-width="1.7"/>`;
  });});
  nodes.forEach(n=>{
    const st=TSTYLE[n.type]||TSTYLE.split,h=nnote(n)?40:28,y=n._cy-h/2,txx=n._x+10;
    const clk=n.keys&&n.keys.length;
    s+=`<g class="tnode${clk?' tn-on':''}"${clk?` data-keys="${esc(n.keys.join('|'))}" data-card="${cardId}" data-label="${esc(nlab(n))}"`:''}>`;
    s+=`<rect class="tnbox" x="${n._x}" y="${y}" width="${n._w}" height="${h}" rx="7" fill="${st.fill}" stroke="${st.stroke}" stroke-opacity="0.6"/>`+
       `<rect x="${n._x}" y="${y}" width="3.5" height="${h}" rx="2" fill="${st.stroke}"/>`;
    const titleY=nnote(n)?n._cy-4:n._cy;
    s+=`<text x="${txx}" y="${titleY}" font-size="11.5" font-weight="650" fill="${st.text}" dominant-baseline="middle">${esc(nlab(n))}`;
    if(n.level)s+=`<tspan dx="5" font-family="ui-monospace,Menlo,monospace" font-size="9.5" font-weight="400" fill="#7a8694">${esc(n.level)}</tspan>`;
    s+=`</text>`;
    if(nnote(n))s+=`<text x="${txx}" y="${n._cy+10}" font-size="9.5" fill="#8a93a0">${esc(nnote(n))}</text>`;
    s+=`</g>`;
  });
  return s+`</svg>`;
}

/* ---- nerve card ---- */
function cardHTML(d){
  const nm=tx(d.name,d.namef), div=tx(d.div[0],d.div[1]);
  let body="";
  const tree=TREES[d.id];
  if(tree){
    body+=`<div class="treewrap"><div class="treelabel">${T("branching")}</div>${renderTree(tree,d.id)}</div>`;
  }
  body+=`<div class="cdiv"><span class="divnote">${esc(div)}</span></div>`;
  body+=secMotor(d.motor);
  if(d.sub)  body+=`<div class="sec"><div class="sh"><span class="sq" style="background:#9aa3b0"></span>${tx('Distal branches','Branches distales')}</div>${subBlock(d.sub)}</div>`;
  if(d.pass) body+=secPass(d.pass);
  if(d.passTarsal) body+=secPass(d.passTarsal);
  body+=secSens(d.sensory);
  body+=secPearl(d.pearls);
  return `<div class="card" id="card-${d.id}" data-nerve="${d.id}">`+
    `<div class="chead"><span class="nm">${esc(nm)}</span><span class="lv">${esc(d.level)}</span></div>`+
    `<div class="cbody">${body}</div></div>`;
}
function renderCards(){
  document.getElementById("grid").innerHTML=DATA.map(cardHTML).join("");
}

/* ---- ROOT chips (header) + ROOT cards ---- */
function renderRootChips(){

function renderRoots(){
  const box=document.getElementById("roots");
  box.innerHTML=ROOTS.map(r=>{
    const rot=tx(r.rot[0],r.rot[1]);
    const myo=r.myo.map(mm=>{
      const mus=tx(mm[0],mm[1]),nrv=tx(mm[2],mm[3]);

    }).join("");

      `<h3>${r.id}<em>${T("reflex")}: ${esc(rot)}</em></h3>`+
      `<div class="blk"><div class="t">${T("myotome")}</div><div class="v">${myo}</div></div>`+
      `<div class="blk"><div class="t">${T("derm")}</div><div class="v derm"><b>${T("dermP")}</b> ${esc(tx(r.pns[0],r.pns[1]))} · <b>${T("dermA")}</b> ${esc(tx(r.asia[0],r.asia[1]))}</div></div>`+
      `</div>`;
  }).join("");
  box.querySelectorAll(".rootcard").forEach(b=>b.onclick=()=>selectRoot(b.dataset.root));
}

function buildCMap(){
  const svg=document.getElementById("cmap"); if(!svg) return;
  const reg=CREG();
  const x0=150,colW=118,top=30,rowGap=16,pad=18,labelX=6,sepH=30;
  const xC=r=>x0+r*colW+colW/2;
  const setRowH=l=>{const per={};l.dots.forEach(d=>per[d.r]=(per[d.r]||0)+1);l.maxc=Math.max(1,...Object.values(per));l.rowH=l.maxc*rowGap+pad;};
  CMAP.forEach(setRowH); CPROX.forEach(setRowH);
  const H=top+CMAP.reduce((a,l)=>a+l.rowH,0)+sepH+CPROX.reduce((a,l)=>a+l.rowH,0)+6, W=x0+6*colW+8;
  let inner="";
  for(let r=0;r<6;r++)inner+=`<text class="creg" x="${xC(r)}" y="17">${esc(reg[r])}</text>`;
  for(let r=0;r<=6;r++){const x=x0+r*colW;inner+=`<line class="cdiv" x1="${x}" y1="24" x2="${x}" y2="${H-4}"/>`;}
  let y=top;
  function lane(l,prox){
    const cy=y+l.rowH/2,col=l.col||COLOR[l.id]||"#475569",nm=l.name();
    inner+=`<line class="claneln" x1="${x0}" y1="${cy}" x2="${x0+6*colW}" y2="${cy}" stroke="${col}"/>`;
    inner+=`<text class="clane" x="${labelX}" y="${cy}" dominant-baseline="central" fill="${col}">${esc(nm)}</text>`;
    const byR={};l.dots.forEach(d=>{(byR[d.r]=byR[d.r]||[]).push(d);});
    Object.keys(byR).forEach(rk=>{
      const arr=byR[rk],r=+rk,k=arr.length,cellL=x0+r*colW;
      arr.forEach((d,i)=>{
        const dy=cy+(i-(k-1)/2)*rowGap,dx=cellL+12,lb=d.label();
        if(prox){
          inner+=`<g class="csite cprox" data-prox="${l.id}" data-label="${esc(lb)}" data-us="${esc(d.us?d.us():'')}">`+
            `<circle cx="${dx}" cy="${dy}" r="11" fill="transparent"/>`+
            `<circle class="chalo" cx="${dx}" cy="${dy}" r="8.5" fill="#fff"/>`+
            `<circle class="cdot" cx="${dx}" cy="${dy}" r="5.5" fill="#475569"/>`+
            `<text class="clbl" x="${dx+10}" y="${dy}" dominant-baseline="central">${esc(lb)}</text></g>`;
        }else{
          inner+=`<g class="csite" data-card="${l.id}" data-key="${esc(d.key)}" data-label="${esc(lb)}" data-us="${esc(d.us?d.us():'')}">`+
            `<circle cx="${dx}" cy="${dy}" r="11" fill="transparent"/>`+
            `<circle class="chalo" cx="${dx}" cy="${dy}" r="8.5" fill="#fff"/>`+
            `<circle class="cdot" cx="${dx}" cy="${dy}" r="5.5" fill="#2c8a5f"/>`+
            `<text class="clbl" x="${dx+10}" y="${dy}" dominant-baseline="central">${esc(lb)}</text></g>`;
        }
      });
    });
    y+=l.rowH;
  }
  CMAP.forEach(l=>lane(l,false));
  const sy=y+sepH/2;
  inner+=`<line x1="${labelX}" y1="${sy}" x2="${x0+6*colW}" y2="${sy}" stroke="#d6dce4" stroke-dasharray="3 3"/>`;
  inner+=`<text x="${labelX}" y="${sy-6}" style="text-anchor:start;font:600 9.5px var(--sans);fill:#9aa4b1;letter-spacing:.07em">${esc(tx('PROXIMAL · PLEXUS','PROXIMAL · PLEXUS'))}</text>`;
  y+=sepH;
  CPROX.forEach(l=>lane(l,true));
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  svg.innerHTML=inner;
  svg.querySelectorAll(".csite").forEach(g=>g.addEventListener("click",()=>{
    if(g.dataset.prox) proxClick(g.dataset.prox); else siteClick(g);
    showUS(g);
  }));
}

function renderEponyms(){
  const box=document.getElementById("eponyms");
  const bubble=(cls,nm,tt)=>`<div class="epi ${cls}" data-search="${esc((nm+' '+tt).toLowerCase())}">`+
    `<div class="epihead">${esc(nm)}</div><div class="epibody">${esc(tt)}</div></div>`;
  let h=`<div class="epsub">${esc(tx("Cross-cutting localiser rules","Règles de localisation transversales"))}`+
        `<span class="epsub-src">Preston &amp; Shapiro</span></div>`;
  h+=LOCALIZE.map((p,i)=>bubble("rule",tx(LOCALIZE_T[i][0],LOCALIZE_T[i][1]),tx(p[0],p[1]))).join("");
  h+=`<div class="epsub">${esc(tx("Named syndromes & entrapments","Syndromes nommés & entrapments"))}</div>`;
  h+=EPONYMS.map(e=>bubble("syn",tx(e[0][0],e[0][1]),tx(e[1][0],e[1][1]))).join("");
  box.innerHTML=h;
}

let planSel=null;
function renderPlanner(){
  const bar=document.getElementById("planbar");
  bar.innerHTML=PLANNER.map(s=>`<button class="planpill" data-scn="${s.id}">${esc(tx(s.label[0],s.label[1]))}</button>`).join("");
  bar.querySelectorAll(".planpill").forEach(b=>b.onclick=()=>plannerPick(b.dataset.scn));
  if(planSel) plannerRender(planSel); else {const p=document.getElementById("planpanel");p.hidden=true;p.innerHTML="";}
}
function plannerPick(id){
  if(planSel===id){planSel=null;const p=document.getElementById("planpanel");p.hidden=true;p.innerHTML="";
    document.querySelectorAll(".planpill").forEach(b=>b.classList.remove("on"));updateHash();return;}
  planSel=id; plannerRender(id); updateHash();
  const p=document.getElementById("planpanel");
  const reduce=(typeof matchMedia==="function")&&matchMedia("(prefers-reduced-motion:reduce)").matches;
  try{p.scrollIntoView({behavior:reduce?"auto":"smooth",block:"nearest"});}catch(e){}
}
function plannerRender(id){
  const s=PLANNER.find(x=>x.id===id); if(!s)return;
  document.querySelectorAll(".planpill").forEach(b=>b.classList.toggle("on",b.dataset.scn===id));
  const item=a=>`<div class="plitem"><div class="pln">${esc(tx(a[0],a[1]))}</div><div class="plw">${esc(tx(a[2],a[3]))}</div></div>`;
  const p=document.getElementById("planpanel"); p.hidden=false;
  p.innerHTML=`<div class="plhead">${esc(tx(s.label[0],s.label[1]))}</div>`+
    `<div class="plvig">${esc(tx(s.vig[0],s.vig[1]))}</div>`+
    `<div class="plcols">`+
      `<div class="plcol ncs"><h4>${esc(tx("Nerve conduction studies","Études de conduction"))}</h4>${s.ncs.map(item).join("")}</div>`+
      `<div class="plcol ndl"><h4>${esc(tx("Needle exam","Examen à l'aiguille"))}</h4>${s.ndl.map(item).join("")}</div>`+
    `</div>`+
    `<div class="plbottom"><b>${esc(tx("Bottom line","En bref"))} :</b> ${esc(tx(s.bottom[0],s.bottom[1]))}</div>`;
}

let quizState={};
function renderQuiz(){
  const box=document.getElementById("quiz");
  box.innerHTML=QUIZ.map((c,i)=>
    `<div class="qcard" data-qi="${i}"><div class="qstem">${esc(tx(c.stem[0],c.stem[1]))}</div>`+
    `<div class="qopts">`+c.opts.map((o,j)=>`<button class="qopt" data-qi="${i}" data-oi="${j}">${esc(tx(o[0],o[1]))}</button>`).join("")+`</div>`+
    `<div class="qexplain" id="qx-${i}"><b>${esc(tx("Why","Pourquoi"))} :</b> ${esc(tx(c.exp[0],c.exp[1]))}</div></div>`).join("");
  box.querySelectorAll(".qopt").forEach(b=>b.onclick=()=>quizAnswer(+b.dataset.qi,+b.dataset.oi));
  Object.keys(quizState).forEach(i=>applyQuizReveal(+i));
  renderQuizBar();
}
function quizAnswer(i,j){ if(quizState[i]!==undefined)return; quizState[i]=j; applyQuizReveal(i); renderQuizBar(); }
function applyQuizReveal(i){
  const card=document.querySelector(`.qcard[data-qi="${i}"]`); if(!card)return;
  const ans=QUIZ[i].ans, chosen=quizState[i];
  card.querySelectorAll(".qopt").forEach(b=>{const j=+b.dataset.oi; b.classList.add("locked");
    if(j===ans)b.classList.add("correct"); if(j===chosen&&j!==ans)b.classList.add("wrong");});
  const ex=document.getElementById("qx-"+i); if(ex)ex.classList.add("show");
}
function renderQuizBar(){
  const bar=document.getElementById("quizbar");

  const correct=keys.filter(i=>+quizState[i]===QUIZ[+i].ans).length;
  bar.innerHTML=`<button class="planpill" id="quizreset">${esc(tx("Reset quiz","Recommencer"))}</button>`+
    `<span class="quizscore">${done?`${correct} / ${done} ${esc(tx("correct","bon"+(correct>1?"s":"")))}`:esc(tx("Answer to score","Répondez pour le score"))}</span>`;
  const rb=document.getElementById("quizreset"); if(rb)rb.onclick=()=>{quizState={};renderQuiz();};
}

/* ---- DEEP LINKS (shareable URL hash) ---- */
let selfHash="";
function updateHash(){
  const parts=[];
  if(activeRoot)parts.push("root="+activeRoot);
  else if(focusN)parts.push("nerve="+focusN);
  else if(plexSel)parts.push("plex="+plexSel);
  else if(siteSel)parts.push("site="+siteSel.dataset.card+"~"+encodeURIComponent(siteSel.dataset.key||""));
  if(planSel)parts.push("plan="+planSel);
  const h=parts.join("&");
  selfHash=h?("#"+h):"";
  try{history.replaceState(null,"",h?("#"+h):location.pathname+location.search);}
  catch(e){try{location.hash=h;}catch(_){}}
}
function applyHash(){
  const h=(location.hash||"").replace(/^#/,""); if(!h)return;
  const m={}; h.split("&").forEach(kv=>{const[k,v]=kv.split("=");if(k)m[k]=decodeURIComponent(v||"");});
  if(m.plan && PLANNER.some(s=>s.id===m.plan) && planSel!==m.plan) plannerPick(m.plan);
  if(m.root){ if(activeRoot!==m.root) selectRoot(m.root); }
  else if(m.nerve){ if(focusN!==m.nerve) focusNerve(m.nerve); }
  else if(m.plex){ if(plexSel!==m.plex) plexClick(m.plex); }
  else if(m.site){ const[card,key]=m.site.split("~");
    if(!(siteSel&&siteSel.dataset.card===card&&(siteSel.dataset.key||"").toLowerCase()===(key||"").toLowerCase())){
      const g=document.querySelector(`.csite[data-card="${card}"][data-key="${(key||'').toLowerCase()}"]`);
      if(g){ if(g.dataset.prox) proxClick(g.dataset.prox); else siteClick(g); showUS(g); } } }
}
function showUS(g){
  const un=document.getElementById("usnote"); if(!un)return;
  const active=g.classList.contains("sel")||(g.dataset.prox&&plexSel===g.dataset.prox);
  const us=g.dataset.us;
  if(active&&us){un.hidden=false;
    un.innerHTML=`<span class="ustag">${esc(tx("Ultrasound","Échographie"))}</span><b>${esc(g.dataset.label)}</b> — ${esc(us)}`;}
  else un.hidden=true;
}

/* ---- braid clear / by-root / focus ---- */
function clearBraidHL(){
  const b=document.getElementById("braid"); if(b)b.classList.remove("rootlit");
  document.querySelectorAll(".braid .seg,.braid .node,.braid .tap").forEach(n=>n.classList.remove("lvhit","lvdim","dim","lit","sweep"));
}
function braidByRoot(r){
  clearBraidHL();
  const b=document.getElementById("braid"); if(b)b.classList.add("rootlit");
  document.querySelectorAll(".braid .seg,.braid .node.small,.braid .node.term,.braid .tap,.braid .plexel").forEach(n=>{
    const lv=(n.dataset.lv||"").split(" ");
    n.classList.add(lv.includes(r)?"lvhit":"lvdim");
  });
  document.querySelectorAll(".braid .node.root").forEach(n=>n.classList.add(n.dataset.root===r?"lvhit":"lvdim"));
}
function braidByNerve(id){
  clearBraidHL();
  const roots=new Set(NROOTS[id]||[]);
  document.querySelectorAll(".braid .seg,.braid .tap").forEach(n=>{
    const path=(n.dataset.path||"").split(" ");
    if(path.includes(id)){n.classList.add("lit"); if(n.tagName==="path"){try{const L=n.getTotalLength();n.style.setProperty("--len",L);n.classList.add("sweep");}catch(e){}}}
    else n.classList.add("dim");
  });
  document.querySelectorAll(".braid .node.term").forEach(n=>{
    const on=n.dataset.nerve===id||(id==="sciatic"&&["peroneal","tibial"].includes(n.dataset.nerve));
    n.classList.add(on?"lit":"dim");
  });
  document.querySelectorAll(".braid .node.root").forEach(n=>n.classList.add(roots.has(n.dataset.root)?"lit":"dim"));
  const hub=NHUB[id], usesLST=roots.has("L4")||roots.has("L5");
  document.querySelectorAll(".braid .plexel").forEach(n=>{
    const k=n.dataset.elself;
    const on=(k==="LUMB"&&hub==="lumbar")||(k==="SACR"&&hub==="sacral")||(k==="LST"&&hub==="sacral"&&usesLST);
    n.classList.add(on?"lit":"dim");
  });
  document.querySelectorAll(".braid .node.small:not(.plexel)").forEach(n=>{
    const path=(n.dataset.path||"").split(" ");
    n.classList.add(path.includes(id)?"lit":"dim");
  });
}

function applyTypeFilters(){
  ["motor","sensory","pass","pearl"].forEach(t=>{
    const hide=typeOff.has(t);
    document.querySelectorAll(`[data-type="${t}"]`).forEach(n=>n.style.display=hide?"none":"");

function mark(i){const nm=i.querySelector(".mn")||i;if(nm.dataset.orig===undefined)nm.dataset.orig=nm.innerHTML;
  const re=new RegExp("("+query.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig");
  nm.innerHTML=nm.dataset.orig.replace(re,"<mark>$1</mark>");}
function unmark(i){const nm=i.querySelector(".mn")||i;if(nm&&nm.dataset.orig!==undefined)nm.innerHTML=nm.dataset.orig;}
function runSearch(qv){
  query=qv.trim().toLowerCase();
  document.querySelectorAll(".epsub").forEach(s=>s.style.display=query?"none":"");
  document.getElementById("qx").style.display=query?"block":"none";
  const items=document.querySelectorAll("#grid [data-search],#eponyms [data-search]");
  if(!query){items.forEach(i=>{i.style.display="";unmark(i);});applyTypeFilters();
    document.querySelectorAll(".card,.epi").forEach(c=>c.style.display="");defaultStatus();return;}
  clearRoot();clearFocus();clearTree();clearSite();clearPlex();
  let hits=0;
  items.forEach(i=>{
    const match=(i.dataset.search||"").includes(query);
    i.style.display=match?"":"none";
    if(match){hits++;mark(i);}else unmark(i);
  });
  document.querySelectorAll(".card").forEach(c=>{
    const vis=c.querySelectorAll('[data-search]:not([style*="display: none"])').length;
    c.style.display=vis?"":"none";
  });
  document.querySelectorAll(".epi").forEach(c=>{
    if(c.hasAttribute("data-search")) c.style.display=(c.dataset.search||"").includes(query)?"":"none";
  });
  applyTypeFilters();
  setStatus(T("searchRes")(qv,hits));
}

if(typeof window!=="undefined")window.addEventListener("beforeprint",()=>{clearRoot();clearFocus();clearTree();clearSite();clearPlex();});
document.getElementById("reset").onclick=()=>{
  clearRoot();clearFocus();clearTree();clearSite();clearLesion();clearPlex();
  fdSel=null;document.querySelectorAll(".colon").forEach(n=>n.classList.remove("colon"));
  planSel=null;document.querySelectorAll(".planpill").forEach(b=>b.classList.remove("on"));
  document.getElementById("planpanel").hidden=true;
  typeOff.clear();document.querySelectorAll(".tg").forEach(t=>t.classList.remove("off"));
  q.value="";runSearch("");
  document.querySelectorAll(".card").forEach(c=>{c.style.display="";c.classList.remove("collapsed");});
  updateHash();
  defaultStatus();
};
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){document.getElementById("reset").click();q.blur();}
  if(e.key==="/"&&document.activeElement!==q){e.preventDefault();q.focus();}
});

/* ---- boot ---- */
renderAll();
wireBraid();
try{applyHash();}catch(e){}
window.addEventListener("hashchange",()=>{
  if((location.hash||"")===selfHash) return;   /* our own replaceState/hash write — ignore */
  try{applyHash();}catch(e){}
});
</script>
</body>
</html>
