const SEC=[
  ["L1","LP",["L1"]],["L3","LP",["L3"]],["L4","LP",["L4"]],
  ["L4","LST",["L4"]],                 // furcal L4 → sacral plexus

  ["L2","ilioing",["L2"]],

  ["fibularDiv","sural",["S1","S2"]],  // sural dual sensory (peroneal communicating)
];
const ADJ={};
const addEdge=(a,b,lv)=>{(ADJ[a]=ADJ[a]||[]).push([b,lv]);};
Object.keys(KIDS).forEach(a=>KIDS[a].forEach(b=>addEdge(a,b,EDGELV[a+">"+b]||"*")));
SEC.forEach(([a,b,lv])=>addEdge(a,b,lv));
const ALL=Object.keys(NODES);
const MUSCLES=ALL.filter(id=>NODES[id].t==="muscle");

/* =====================================================================
   ENGINE  (dominator logic on the level-tagged DAG)
   ===================================================================== */
function findPath(r,t){
  const stack=[[r,[r]]], seen=new Set();
  while(stack.length){
    const [n,path]=stack.pop();
    if(n===t) return path;
    if(seen.has(n)) continue; seen.add(n);
    (ADJ[n]||[]).forEach(([to,lv])=>{ if(lv==="*"||lv.includes(r)) stack.push([to,path.concat(to)]); });
  }
  return null;
}
function affectedRoots(N,m){ const out=[]; (NODES[m].myo||[]).forEach(r=>{const p=findPath(r,m); if(p&&p.includes(N)) out.push(r);}); return out; }
function classify(N){
  const complete=[],partial=[];
  MUSCLES.forEach(m=>{ const a=affectedRoots(N,m); if(!a.length) return;
    ((NODES[m].myo||[]).every(r=>a.includes(r))?complete:partial).push({id:m,roots:a}); });
  return {complete,partial};
}
function affectedSet(N){ const {complete,partial}=classify(N); return new Set(complete.concat(partial).map(o=>o.id)); }
function affectedSensory(N){
  const out=[],seen=new Set(),st=[N];
  while(st.length){ const n=st.pop(); if(seen.has(n))continue; seen.add(n);
    (ADJ[n]||[]).forEach(([to])=>{ if(NODES[to].t==="sensory") out.push(to); st.push(to); }); }
  return [...new Set(out)];
}
function lineage(m){ const s=new Set(); (NODES[m].myo||[]).forEach(r=>{const p=findPath(r,m); if(p)p.forEach(x=>s.add(x));}); return s; }

/* =====================================================================
   LAYOUT / RENDER
   ===================================================================== */
let SHOW_SENSORY=false;
const kidsOf=id=>(KIDS[id]||[]).filter(k=>SHOW_SENSORY||NODES[k].t!=="sensory");
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function cssvar(c){return c?(getComputedStyle(document.documentElement).getPropertyValue(c.replace(/var\(|\)/g,'').trim())||c).trim():c;}
function colorOf(id){const n=NODES[id];return n.c?cssvar(C[n.c]):"#556072";}
function baseFill(id){const t=NODES[id].t; return t==="root"?"#3f4a58":(t==="sensory"?"#f6f9fb":((t==="plexus"||t==="trunk")?"#eef1f5":"#ffffff"));}
const POS={};
function nodeW(id){
  const n=NODES[id], base=(L(id)||"").length*6.6;
  let w = n.t==="root" ? base+18 : base+16;
  if(n.myo) w = base + 21 + n.myo.join("\u00b7").length*5.2;
  return Math.min(320, Math.max(60, w));
}
function layout(){
  for(const k in POS) delete POS[k];
  const rowH=30; let leaf=0;
  const place=(id,depth)=>{ const kids=kidsOf(id); POS[id]={depth,w:nodeW(id)};
    if(kids.length){ kids.forEach(k=>place(k,depth+1)); POS[id].y=(POS[kids[0]].y+POS[kids[kids.length-1]].y)/2; }
    else { POS[id].y=leaf*rowH+rowH/2; leaf++; } };
  ROOTS.forEach(r=>place(r,0));
  const maxD=Math.max(...Object.values(POS).map(p=>p.depth));
  const colX=[]; let acc=8; const gap=34;
  for(let d=0;d<=maxD;d++){ const w=Math.max(...Object.keys(POS).filter(id=>POS[id].depth===d).map(id=>POS[id].w),60); colX[d]=acc; acc+=w+gap; }
  Object.keys(POS).forEach(id=>POS[id].x=colX[POS[id].depth]);
  return {W:acc, H:Math.max(1,leaf)*rowH+10};
}
const svg=document.getElementById("tree");
function render(){
  const {W,H}=layout(); const PX=18,PT=10,PB=16; const w=Math.round(W),h=Math.round(H);
  svg.setAttribute("viewBox",`${-PX} ${-PT} ${w+PX*2} ${h+PT+PB}`);
  svg.setAttribute("width",w+PX*2); svg.setAttribute("height",h+PT+PB);
  let edges="",nodes="";
  Object.keys(KIDS).forEach(a=>kidsOf(a).forEach(b=>{ edges+=edgePath(a,b,NODES[b].t==="sensory"?"sens":false); }));
  SEC.forEach(([a,b])=>{ if(POS[a]&&POS[b]&&(SHOW_SENSORY||NODES[b].t!=="sensory")) edges+=edgePath(a,b,"secm"); });
  Object.keys(POS).forEach(id=>nodes+=nodeSVG(id));
  svg.innerHTML=`<defs><filter id="sh" x="-20%" y="-45%" width="140%" height="190%"><feDropShadow dx="0" dy="1" stdDeviation="1.05" flood-color="#243049" flood-opacity="0.16"/></filter></defs><g id="edges">${edges}</g><g id="nodes">${nodes}</g>`;
  svg.querySelectorAll(".node").forEach(g=>{
    g.addEventListener("click",e=>{e.stopPropagation();onClick(g.dataset.id);});
    g.addEventListener("mouseenter",()=>peek(g.dataset.id));
    g.addEventListener("mouseleave",unpeek);
  });
}
svg.addEventListener("click",()=>{ if(sel||slotA||slotB){ resetSel(); } });
function edgePath(a,b,kind){ const pa=POS[a],pb=POS[b]; if(!pa||!pb)return "";
  const x1=pa.x+pa.w,y1=pa.y,x2=pb.x,y2=pb.y,mx=(x1+x2)/2;
  const cls= kind==="sens"?"edge sens": kind==="secm"?"edge sec":"edge";
  return `<path class="${cls}" data-a="${a}" data-b="${b}" d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}"/>`;
}
function nodeSVG(id){
  const p=POS[id],n=NODES[id],col=colorOf(id),h=22,y=p.y-h/2;
  const sens=n.t==="sensory";
  const fill=baseFill(id);
  const sw=n.t==="nerve"?1.9:(n.t==="root"?0:1.2);
  const sop=n.t==="root"?1:(n.t==="nerve"?0.9:(sens?0.7:0.55));
  const dash=sens?` stroke-dasharray="3 3"`:"";
  const barW=n.t==="nerve"?4.5:(n.t==="muscle"?3:3.5);
  const tcol=n.t==="root"?"#fff":col;
  const lc=sens?"nlabel sens":"nlabel";
  let label=`<text class="${lc}" x="${p.x+9}" y="${p.y}" fill="${tcol}">${esc(L(id))}</text>`;
  if(n.myo) label=`<text class="${lc}" x="${p.x+9}" y="${p.y}" fill="${tcol}">${esc(L(id))}<tspan class="nlv" dx="5">${n.myo.join("\u00b7")}</tspan></text>`;
  const title=`${esc(L(id))}${n.myo?" \u00b7 "+n.myo.join(","):""}${sens?" \u00b7 "+esc(TERR(id)):""}`;
  return `<g class="node" data-id="${id}" data-t="${n.t}">`+
    `<rect x="${p.x}" y="${y}" width="${p.w}" height="${h}" rx="6" fill="${fill}" stroke="${col}" stroke-width="${sw}" stroke-opacity="${sop}"${dash} filter="url(#sh)"/>`+
    `<rect x="${p.x}" y="${y}" width="${barW}" height="${h}" rx="2" fill="${col}"/>`+
    label+`<title>${title}</title></g>`;
}

const panel=document.getElementById("panel");
const NVORDER=["fem","obt","glut","tib","fib","prox"];
let sel=null, cmpMode=false, slotA=null, slotB=null;
const CMPA=()=>cssvar("var(--cmpA)"),CMPB=()=>cssvar("var(--cmpB)"),CMPBOTH=()=>cssvar("var(--cmpBoth)");

function clearHL(){
  svg.classList.remove("dimmed");
  svg.querySelectorAll(".node").forEach(g=>{g.classList.remove("on","block","peek","peekhead");
    const id=g.dataset.id,n=NODES[id],r=g.querySelector("rect");
    r.setAttribute("fill", baseFill(id));
    r.setAttribute("stroke", colorOf(id)); r.setAttribute("stroke-width", n.t==="nerve"?1.9:(n.t==="root"?0:1.2));
    const lab=g.querySelector(".nlabel"); if(lab) lab.setAttribute("fill", n.t==="root"?"#fff":colorOf(id));
  });
  svg.querySelectorAll(".edge").forEach(e=>e.classList.remove("eon"));
}
function resetSel(){ sel=null; slotA=null; slotB=null; clearHL(); if(cmpMode) showCmpPrompt(); else showEmpty(); }
function markOn(id){const g=svg.querySelector(`.node[data-id="${id}"]`); if(g)g.classList.add("on");}
function markEdge(a,b){const e=svg.querySelector(`.edge[data-a="${a}"][data-b="${b}"]`); if(e)e.classList.add("eon");}
function paintNode(id,fill,stroke,whiteText){const g=svg.querySelector(`.node[data-id="${id}"]`); if(!g)return; g.classList.add("on");
  const r=g.querySelector("rect"); if(fill)r.setAttribute("fill",fill); if(stroke){r.setAttribute("stroke",stroke);r.setAttribute("stroke-opacity",1);}
  if(whiteText){const lab=g.querySelector(".nlabel"); if(lab)lab.setAttribute("fill","#fff");}}

function peek(id){ if(sel||cmpMode)return;
  const node=NODES[id],g=svg.querySelector(`.node[data-id="${id}"]`); if(g)g.classList.add("peek","peekhead");
  let ids=[]; if(node.t==="muscle")ids=[...lineage(id)];
  else if(node.t==="sensory")ids=[id];
  else { const {complete,partial}=classify(id); ids=complete.concat(partial).map(o=>o.id); if(SHOW_SENSORY)ids=ids.concat(affectedSensory(id)); }
  ids.forEach(x=>{const gg=svg.querySelector(`.node[data-id="${x}"]`); if(gg)gg.classList.add("peek");});
}
function unpeek(){ svg.querySelectorAll(".node.peek").forEach(g=>g.classList.remove("peek","peekhead")); }

function onClick(id){
  if(cmpMode){ compareClick(id); return; }
  if(sel===id){ sel=null; clearHL(); showEmpty(); return; }
  sel=id; clearHL(); applySingle(id);
}
function applySingle(id){
  const node=NODES[id];
  svg.classList.add("dimmed");
  const g=svg.querySelector(`.node[data-id="${id}"]`); g.classList.add("on","block");
  if(node.t==="muscle"){ showMuscle(id); return; }
  if(node.t==="sensory"){ markOn(id); showSensoryNode(id); return; }
  const {complete,partial}=classify(id);
  complete.concat(partial).forEach(({id:mid,roots})=>{
    roots.forEach(r=>{const p=findPath(r,mid); if(p&&p.includes(id)){for(let i=0;i<p.length;i++){markOn(p[i]); if(i<p.length-1)markEdge(p[i],p[i+1]);}}});
  });
  complete.forEach(o=>paintNode(o.id,cssvar("var(--complete)"),cssvar("var(--complete)"),true));
  partial.forEach(o=>paintNode(o.id,"#fcf1df",cssvar("var(--partial)"),false));
  let sens=[];
  if(SHOW_SENSORY){ sens=affectedSensory(id); sens.forEach(s=>{markOn(s); paintNode(s,"#e2efef",cssvar(C[NODES[s].c]),false);}); }
  showPanel(id,complete,partial,sens);
}
function grpByNerve(arr){const by={}; arr.forEach(o=>{const c=NODES[o.id].c||"prox";(by[c]=by[c]||[]).push(o);}); return by;}
function muscleLi(o,part){const n=NODES[o.id]; const keep=part?` \u00b7 ${T("keeps")} ${n.myo.filter(r=>!o.roots.includes(r)).join("/")}`:"";
  return `<li class="${part?'part':''}"><span>${esc(L(o.id))}</span><span class="lv">${n.myo.join(" ")}${keep}</span></li>`;}
function nerveGroups(arr,part){const by=grpByNerve(arr); let h="";
  NVORDER.forEach(c=>{ if(!by[c])return; h+=`<div class="grp"><h4><span class="nv" style="background:${cssvar(C[c])}"></span>${NVNAME[lang][c]}</h4><ul class="musc">${by[c].map(o=>muscleLi(o,part)).join("")}</ul></div>`; });
  return h;}
function sensoryGroup(sens){ if(!sens.length)return "";
  return `<div class="ph" style="margin-top:16px">${T("sensoryTerr")}</div><ul class="musc sens">`+
    sens.map(s=>`<li><span>${esc(L(s))}</span><span class="terr">${esc(TERR(s))}</span></li>`).join("")+`</ul>`;}
function typeLabel(t){return {root:T("typeRoot"),plexus:T("typePlexus"),trunk:T("typeTrunk"),division:T("typeDivision"),nerve:T("typeNerve"),branch:T("typeBranch"),sensory:T("typeSensory")}[t]||"";}
function showPanel(id,complete,partial,sens){
  const n=NODES[id], proximal=["root","plexus","trunk","division"].includes(n.t);
  let h=`<div class="ph">${T("blockPoint")}</div><div class="blockpoint">${esc(L(id))}</div><div class="blockmeta">${typeLabel(n.t)}</div>`+
    `<div class="countrow"><span class="pill c">${complete.length} ${T("complete")}</span>${partial.length?`<span class="pill p">${partial.length} ${T("partial")}</span>`:""}</div>`;
  if(complete.length) h+=`<div class="ph" style="margin-top:14px">${T("completelyDen")}</div>`+nerveGroups(complete,false);
  if(partial.length) h+=`<div class="ph" style="margin-top:16px">${T("partiallyAff")}</div>`+nerveGroups(partial,true);
  if(!complete.length&&!partial.length) h+=`<p class="empty">${T("noDistal")}</p>`;
  if(SHOW_SENSORY) h+=sensoryGroup(sens);
  if(proximal) h+=`<div class="caveat">${T("proximalCaveat")}</div>`;
  panel.innerHTML=h;
}
function showMuscle(id){
  const n=NODES[id], ln=lineage(id); ln.forEach(markOn);
  (n.myo||[]).forEach(r=>{const p=findPath(r,id); if(p)for(let i=0;i<p.length-1;i++)markEdge(p[i],p[i+1]);});
  paintNode(id,cssvar("var(--complete)"),cssvar("var(--complete)"),true);
  let longest=[]; (n.myo||[]).forEach(r=>{const p=findPath(r,id); if(p&&p.length>longest.length)longest=p;});
  const chips=longest.map(x=>`<span class="chip">${esc(L(x))}</span>`).join(" <b>\u2192</b> ");
  panel.innerHTML=`<div class="ph">${T("targetMuscle")}</div><div class="blockpoint">${esc(L(id))}</div>`+
    `<div class="blockmeta">${NVNAME[lang][n.c]} \u00b7 ${T("myotome")} ${n.myo.join("\u2013")}</div>`+
    `<div class="ph" style="margin-top:14px">${T("toBlockOnly")}</div><div class="pathline">${chips}</div>`+
    `<div class="caveat">${T("onlyBranchNote").replace("{m}",esc(L(id)))}</div>`;
}
function showSensoryNode(id){
  const n=NODES[id];
  panel.innerHTML=`<div class="ph">${typeLabel("sensory")}</div><div class="blockpoint">${esc(L(id))}</div>`+
    `<div class="blockmeta">${NVNAME[lang][n.c]}</div>`+
    `<div class="ph" style="margin-top:14px">${T("territory")}</div><div class="pathline">${esc(TERR(id))}</div>`+
    `<div class="caveat">${T("sensoryNodeMsg")}</div>`;
}
function showEmpty(){ panel.innerHTML=`<div class="empty">${T("emptyMsg")}</div>`; }

/* compare */
function showCmpPrompt(){ panel.innerHTML=`<div class="empty">${slotA?T("cmpPickB"):T("cmpPrompt")}</div>`; }
function compareClick(id){
  if(NODES[id].t==="sensory"){ return; }
  if(!slotA){ slotA=id; clearHL(); applyCompare(); }
  else if(!slotB){ if(id===slotA){ slotA=null; clearHL(); showCmpPrompt(); return;} slotB=id; clearHL(); applyCompare(); }
  else { slotA=id; slotB=null; clearHL(); applyCompare(); }
}
function applyCompare(){
  const sa=slotA?affectedSet(slotA):new Set(), sb=slotB?affectedSet(slotB):new Set();
  const union=new Set([...sa,...sb]);
  union.forEach(m=>{ const inA=sa.has(m),inB=sb.has(m);
    const fill=inA&&inB?CMPBOTH():(inA?CMPA():CMPB()); paintNode(m,fill,fill,true); });
  if(slotA){ paintNode(slotA,null,CMPA(),false); const r=svg.querySelector(`.node[data-id="${slotA}"] rect`); if(r)r.setAttribute("stroke-width","3"); }
  if(slotB){ paintNode(slotB,null,CMPB(),false); const r=svg.querySelector(`.node[data-id="${slotB}"] rect`); if(r)r.setAttribute("stroke-width","3"); }
  showComparePanel(sa,sb);
}
function cmpLi(id){const n=NODES[id]; return `<li><span>${esc(L(id))}</span><span class="lv">${(n.myo||[]).join(" ")}</span></li>`;}
function showComparePanel(sa,sb){
  const onlyA=[...sa].filter(m=>!sb.has(m)), onlyB=[...sb].filter(m=>!sa.has(m)), both=[...sa].filter(m=>sb.has(m));
  const dot=c=>`<span class="nv" style="background:${c};width:9px;height:9px;border-radius:50%;display:inline-block"></span>`;
  let h=`<div class="ph">${T("compare")}</div>`+
    `<div class="pathline">${dot(CMPA())} <b>A</b> · ${slotA?esc(L(slotA)):"—"}<br>${dot(CMPB())} <b>B</b> · ${slotB?esc(L(slotB)):"—"}</div>`+
    `<div class="countrow"><span class="pill a">${onlyA.length} ${T("onlyA")}</span><span class="pill both">${both.length} ${T("both")}</span><span class="pill b">${onlyB.length} ${T("onlyB")}</span></div>`;
  const blk=(title,arr,cls)=> arr.length?`<div class="grp"><h4>${title}</h4><ul class="musc ${cls}">${arr.map(cmpLi).join("")}</ul></div>`:"";
  h+=blk(T("onlyA"),onlyA,"")+blk(T("both"),both,"")+blk(T("onlyB"),onlyB,"");
  if(!slotB) h+=`<div class="caveat">${T("cmpPickB")}</div>`;
  panel.innerHTML=h;
}

function reApply(){
  clearHL();
  if(cmpMode){ if(slotA||slotB)applyCompare(); else showCmpPrompt(); }
  else if(sel){ if(svg.querySelector(`.node[data-id="${sel}"]`)) applySingle(sel); else { sel=null; showEmpty(); } }
  else showEmpty();
}

/* =====================================================================
   CONTROLS / LANG
   ===================================================================== */
const q=document.getElementById("q"),qx=document.getElementById("qx");
function applyLang(){
  document.documentElement.lang=lang;
  document.getElementById("ttlMain").textContent=T("title");
  document.getElementById("ttlSub").textContent=T("tsub");
  document.getElementById("subTxt").innerHTML=T("sub");
  q.placeholder=T("search");
  document.getElementById("reset").textContent=T("reset");
  document.getElementById("printbtn").textContent=T("print");
  const sb=document.getElementById("sensBtn"); sb.textContent=T("sensory"); sb.classList.toggle("active",SHOW_SENSORY);
  const cb=document.getElementById("cmpBtn"); cb.textContent=T("compare"); cb.classList.toggle("active",cmpMode);
  document.getElementById("langBtn").textContent= lang==="en"?"Fran\u00e7ais":"English";
  const items=[["complete","var(--complete)"],["partial","var(--partial)"],["fem","var(--fem)"],["obt","var(--obt)"],["glut","var(--glut)"],["tib","var(--tib)"],["fib","var(--fib)"],["prox","var(--prox)"]];
  let lg=items.map(([k,c])=>`<span><i style="background:${c}"></i>${k==="complete"?T("complete"):k==="partial"?T("partial"):LEGTXT[lang][k]}</span>`).join("");
  if(SHOW_SENSORY) lg+=`<span><i class="dash"></i>${LEGTXT[lang].sensory}</span>`;
  document.getElementById("legend").innerHTML=lg;
}
document.getElementById("langBtn").addEventListener("click",()=>{ lang=lang==="en"?"fr":"en"; applyLang(); render(); reApply(); });
document.getElementById("sensBtn").addEventListener("click",()=>{ SHOW_SENSORY=!SHOW_SENSORY; applyLang(); render(); reApply(); });
document.getElementById("cmpBtn").addEventListener("click",()=>{ cmpMode=!cmpMode; sel=null; slotA=null; slotB=null; clearHL(); applyLang();
  if(cmpMode) showCmpPrompt(); else showEmpty(); });
q.addEventListener("input",()=>{ const v=q.value.trim().toLowerCase(); qx.style.display=v?"block":"none"; if(!v)return;
  const hit=MUSCLES.find(m=>L(m).toLowerCase().includes(v)||m.toLowerCase().includes(v));
  if(hit){ if(cmpMode){cmpMode=false;applyLang();} sel=null; clearHL(); onClick(hit); const g=svg.querySelector(`.node[data-id="${hit}"]`); g&&g.scrollIntoView({block:"center",behavior:"smooth"}); } });
qx.addEventListener("click",()=>{ q.value=""; qx.style.display="none"; resetSel(); });
document.getElementById("reset").addEventListener("click",()=>{ q.value=""; qx.style.display="none"; resetSel(); });
document.getElementById("printbtn").addEventListener("click",()=>window.print());
window.addEventListener("keydown",e=>{ if(e.key==="Escape"){ q.value=""; qx.style.display="none"; resetSel(); } });

// tests hooks
window.__classify=classify; window.__findPath=findPath; window.__affectedSensory=affectedSensory; window.__affectedSet=affectedSet;
window.onClick=onClick; window.peek=peek; window.unpeek=unpeek; window.__setLang=l=>{lang=l;applyLang();render();reApply();};
window.__setSensory=v=>{SHOW_SENSORY=v;applyLang();render();reApply();};
window.__setCompare=v=>{cmpMode=v;sel=null;slotA=null;slotB=null;clearHL();applyLang();cmpMode?showCmpPrompt():showEmpty();};

applyLang(); render(); showEmpty();
</script>
</body>
</html>
